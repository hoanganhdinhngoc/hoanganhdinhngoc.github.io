<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mera Global Infrastructure V10 - 16K & High-Res Borders</title>
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
      font-family: sans-serif; 
    }
    
    #globeViz { 
      width: 100vw; 
      height: 100vh; 
    }
    
    #globeViz canvas {
      filter: brightness(1.5) contrast(1.2);
    }

    .title-overlay {
      position: absolute; top: 20px; left: 20px; color: white;
      pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="title-overlay">
    <h1 style="margin:0; color: #ff3333;">MERA NETWORK</h1>
    <p style="margin:5px 0; opacity: 0.8;">Hạ tầng internet của Mera xuyên suốt khu vực</p>
    <br>
    <p style="margin:5px 0; opacity: 0.8;">Demo cho anh zai :))))</p>
  </div>
  
  <div id="globeViz"></div>

  <script>
    // --- BƯỚC 1: LOGIC KIỂM TRA THIẾT BỊ VÀ TẢI TEXTURE TƯƠNG ỨNG ---
    const isDesktop = window.innerWidth > 1024;
    
    // THƯA SIR: Anh hãy upload 1 tấm ảnh bản đồ đêm 16K lên host của mình và thay link vào biến texture16K này nhé.
    // Em đang tạm dùng link 8K để code không bị lỗi 404 khi anh chạy test.
    const texture16K = 'https://hoanganhdinhngoc.github.io/demos/mera-site/globe/earth-at-night.jpg';
    const texture8K = 'https://unpkg.com/three-globe/example/img/earth-night.jpg';
    
    const currentTexture = isDesktop ? texture16K : texture8K;
    const currentBumpMap = 'https://unpkg.com/three-globe/example/img/earth-topology.png';

    // --- DỮ LIỆU ĐIỂM VÀ ĐƯỜNG TRUYỀN ---
    const miraNodes = [
      { lat: 21.0285, lng: 105.8542, name: 'Ha Noi', latOffset: 0.2, lngOffset: -1.1 },
      { lat: 18.6734, lng: 105.6923, name: 'Vinh', latOffset: 0.2, lngOffset: -0.8 },
      { lat: 16.0471, lng: 108.2062, name: 'Da Nang', latOffset: 0.2, lngOffset: 1.3 },
      { lat: 13.7767, lng: 109.2243, name: 'Quy Nhon', latOffset: 0.3, lngOffset: 1.3 },
      { lat: 11.0825, lng: 106.2081, name: 'Moc Bai', latOffset: 0.9, lngOffset: 0 },
      { lat: 10.8231, lng: 106.6297, name: 'Ho Chi Minh', latOffset: -0.1, lngOffset: -1.1 },
      { lat: 10.3460, lng: 107.0843, name: 'Vung Tau', latOffset: 0.1, lngOffset: 1.3 },
      { lat: 11.5564, lng: 104.9282, name: 'Phnom Penh', latOffset: 0, lngOffset: -1.2 },
      { lat: 14.7397, lng: 107.5753, name: 'Po Y', latOffset: -0.1, lngOffset: -0.5 },
      { lat: 16.6204, lng: 106.6022, name: 'Lao Bao', latOffset: -0.2, lngOffset: 0.3 },
      { lat: 16.5663, lng: 104.7523, name: 'Savannakhet', latOffset: 0.6, lngOffset: -1.4 },
      { lat: 21.8510, lng: 106.7570, name: 'Tan Thanh', latOffset: 0.7, lngOffset: -1.2 },
      { lat: 21.0068, lng: 107.2925, name: 'Quang Ninh', latOffset: -0.1, lngOffset: 1.5 },
      { lat: 21.5297, lng: 107.9558, name: 'Mong Cai', latOffset: 0.2, lngOffset: 1.4 },
      { lat: 22.8170, lng: 108.3661, name: 'Nam Ninh', latOffset: 0.6, lngOffset: -0.6 },
      { lat: 13.7563, lng: 100.5018, name: 'Bangkok', latOffset: 0.5, lngOffset: -1.2 },
      { lat: 7.0096, lng: 100.4705, name: 'South Thailand', latOffset: 0.5, lngOffset: -1.7 },
      { lat: 4.2105, lng: 101.9758, name: 'Malaysia', latOffset: 0.4, lngOffset: -1.4 },
      { lat: 1.3521, lng: 103.8198, name: 'Singapore', latOffset: 0, lngOffset: 0 },
      { lat: 22.3193, lng: 114.1694, name: 'Hong Kong', latOffset: 0, lngOffset: 1.8 }
    ];

    const globalNodes = [
      { lat: 40.7128, lng: -74.0060, name: 'New York', latOffset: -0.2, lngOffset: 0  }, 
      { lat: 37.7749, lng: -122.4194, name: 'San Francisco', latOffset: -0.2, lngOffset: 0  },
      { lat: 51.5074, lng: -0.1278, name: 'London', latOffset: -0.2, lngOffset: 0  }, 
      { lat: 50.1109, lng: 8.6821, name: 'Frankfurt', latOffset: -0.2, lngOffset: 0  },
      { lat: 35.6895, lng: 139.6917, name: 'Tokyo', latOffset: -0.2, lngOffset: 0  }, 
      { lat: -33.8688, lng: 151.2093, name: 'Sydney', latOffset: -0.2, lngOffset: 0  }
    ];

    const allPoints = [...miraNodes, ...globalNodes];

    const miraLinksRaw = [
      { start: 'Ha Noi', end: 'Tan Thanh' }, { start: 'Tan Thanh', end: 'Nam Ninh' }, { start: 'Nam Ninh', end: 'Hong Kong' },
      { start: 'Ha Noi', end: 'Quang Ninh' }, { start: 'Quang Ninh', end: 'Mong Cai' }, { start: 'Mong Cai', end: 'Hong Kong' },
      { start: 'Ha Noi', end: 'Vinh' }, { start: 'Vinh', end: 'Da Nang' }, { start: 'Vinh', end: 'Lao Bao' },
      { start: 'Lao Bao', end: 'Savannakhet' }, { start: 'Da Nang', end: 'Po Y' }, { start: 'Po Y', end: 'Savannakhet' },
      { start: 'Savannakhet', end: 'Bangkok' }, { start: 'Da Nang', end: 'Quy Nhon' }, { start: 'Quy Nhon', end: 'Ho Chi Minh' },
      { start: 'Ho Chi Minh', end: 'Vung Tau' }, { start: 'Ho Chi Minh', end: 'Moc Bai' }, { start: 'Moc Bai', end: 'Phnom Penh' },
      { start: 'Phnom Penh', end: 'Bangkok' }, { start: 'Bangkok', end: 'South Thailand' }, { start: 'South Thailand', end: 'Malaysia' },
      { start: 'Malaysia', end: 'Singapore' }, { start: 'Hong Kong', end: 'Da Nang' }, { start: 'Da Nang', end: 'Quy Nhon' },
      { start: 'Quy Nhon', end: 'Vung Tau' }, { start: 'Vung Tau', end: 'Singapore' }, { start: 'South Thailand', end: 'Singapore' }
    ];

    const globalLinksRaw = [
      { startLat: 40.7128, startLng: -74.0060, endLat: 51.5074, endLng: -0.1278 },
      { startLat: 40.7128, startLng: -74.0060, endLat: 37.7749, endLng: -122.4194 },
      { startLat: 51.5074, startLng: -0.1278, endLat: 50.1109, endLng: 8.6821 },
      { startLat: 50.1109, startLng: 8.6821, endLat: 35.6895, endLng: 139.6917 },
      { startLat: 35.6895, startLng: 139.6917, endLat: -33.8688, endLng: 151.2093 },
      { startLat: 37.7749, startLng: -122.4194, endLat: 35.6895, endLng: 139.6917 },
      { startLat: 35.6895, startLng: 139.6917, endLat: 22.3193, endLng: 114.1694 }
    ];

    const miraLinksCoords = miraLinksRaw.map(link => {
        const s = miraNodes.find(n => n.name === link.start);
        const e = miraNodes.find(n => n.name === link.end);
        return { startLat: s.lat, startLng: s.lng, endLat: e.lat, endLng: e.lng };
    });

    const allLinks = [...miraLinksCoords, ...globalLinksRaw];

    function getArcAlt(d) {
        const dist = Math.sqrt(Math.pow(d.endLat - d.startLat, 2) + Math.pow(d.endLng - d.startLng, 2));
        return Math.min(dist * 0.008, 0.15);
    }

    // --- BƯỚC 2: KHỞI TẠO ĐỊA CẦU VỚI TEXTURE ĐỘNG ---
    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl(currentTexture)
      .bumpImageUrl(currentBumpMap)
      .backgroundColor('rgba(0,0,0,0)')

      .pointsData(allPoints)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#ff1111')
      .pointAltitude(0.001)
      .pointRadius(0.12)

      .labelsData(allPoints)
      .labelLat(d => d.lat + (d.latOffset || 0))
      .labelLng(d => d.lng + (d.lngOffset || 0))
      .labelText('name')
      .labelSize(0.3)
      .labelDotRadius(0)
      .labelColor(() => '#ffffff')
      .labelResolution(3)
      .labelAltitude(0.005)

      .arcsData(allLinks)
      .arcColor(() => '#0088ff')
      .arcAltitude(getArcAlt)
      .arcStroke(0.25)
      .arcDashLength(0.5)
      .arcDashGap(0.2)
      .arcDashAnimateTime(2500);

    // --- BƯỚC 3: TẢI BẢN ĐỒ BIÊN GIỚI ĐỘ PHÂN GIẢI CAO (Tỷ lệ 50m) ---
    // Em đã thay link dữ liệu thành ne_50m_admin_0_countries (nét gấp đôi bản cũ 110m).
    // Nếu website thực tế cần độ chi tiết cực đỉnh hơn nữa, Sir có thể tìm file "ne_10m_admin_0_countries.geojson" 
    // trên mạng, tải về máy chủ và thay thế vào link fetch dưới đây.
    fetch('https://hoanganhdinhngoc.github.io/demos/mera-site/globe/ne_10m_admin_0_countries.geojson')
      .then(res => res.json())
      .then(countries => {
        const targetCountries = ['Vietnam', 'Laos', 'Cambodia', 'Thailand', 'Malaysia', 'Singapore'];
        // Lọc đúng các quốc gia Sir yêu cầu
        const filteredCountries = countries.features.filter(d => 
          d.properties.admin && targetCountries.includes(d.properties.admin) || 
          d.properties.ADMIN && targetCountries.includes(d.properties.ADMIN)
        );
        
        world.polygonsData(filteredCountries)
          .polygonCapColor(() => 'rgba(0,0,0,0)')
          .polygonSideColor(() => 'rgba(0,0,0,0)')
          .polygonStrokeColor(() => '#012a7a') // Màu xanh dương đậm như Sir dặn
          .polygonAltitude(0.002);             // Giúp đường border nổi lên một chút, không bị chìm
      });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0;

    // --- GÓC NHÌN & ZOOM MỚI CỦA SIR ---
    world.pointOfView({ lat: 12, lng: 108, altitude: 0.5 });

    // Tinh chỉnh hiển thị siêu nét trên các màn hình phân giải cao
    setTimeout(() => {
      world.renderer().setPixelRatio(window.devicePixelRatio);
      const scene = world.scene();
      scene.traverse(child => {
        if (child.isMesh && child.material && child.material.map) {
          child.material.map.anisotropy = world.renderer().capabilities.getMaxAnisotropy();
          child.material.map.needsUpdate = true;
        }
      });
    }, 500);
  </script>
</body>
</html>
