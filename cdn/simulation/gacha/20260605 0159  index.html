<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>Simulation || Gachapon (Nier Theme)</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <link rel="stylesheet" href="https://hoanganhdinhngoc.github.io/cdn/nier-list-template/modules/popup/nier-popup.css">
    <script src="https://hoanganhdinhngoc.github.io/cdn/nier-list-template/modules/popup/nier-popup.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #85000083;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
        }

        * {
            box-sizing: border-box;
            scrollbar-color: rgba(100,98,86,0.8) rgba(143, 139, 122, 0.7);
            margin: 0;
            padding: 0;
        }

        ::-moz-selection {
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
        }
        ::selection {
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                              linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        /* --- LAYOUT THEME --- */
        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 2em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-align: left;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 1em;
            width: 100%;
            align-items: flex-start;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 20px;
            border-radius: 0px;
        }

        .betting-panel {
            flex: 0 0 400px;
        }

        .stats-panel {
            flex: 1;
            min-width: 0;
        }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* --- UI ELEMENTS --- */
        .themebutton {
            cursor: pointer;
            padding: 10px 15px;
            font-weight: bold;
            color: #4b4340;
            border: none;
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        .themebutton:hover:not(:disabled) {
            color: #d3cebb;
            background-position: left bottom;
        }
        .themebutton:disabled {
            background: rgba(100, 98, 86, 0.4);
            cursor: not-allowed;
            color: rgba(75, 67, 64, 0.6);
        }

        .play-btn { width: 100%; font-size: 18px; padding: 15px; margin-top: 15px; border: 2px solid var(--nier-dark); }

        /* Gacha specific styles */
        #textareaContainer {
            position: relative;
            width: 100%;
            height: 350px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .3);
            overflow: hidden;
        }

        #ballNames {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            color: var(--nier-dark);
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
            line-height: 1.5em;
            outline: none;
            border: none;
            z-index: 5;
        }

        #highlightLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .highlight-duplicate {
            background-color: rgba(119, 47, 37, 0.4);
            display: inline-block;
            width: 100%;
        }

        #canvasContainer {
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* History Table */
        .table-scroll {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--nier-dark);
            scrollbar-width: thin;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #4e493a; color: #d3cebb; padding: 12px; position: sticky; top: 0; font-size: 13px; text-align: center; }
        td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(75, 67, 64, 0.2); font-size: 13px; }

        @media only screen and (max-width: 768px) {
            .function-wrapper {
                flex-direction: column;
                gap: 2em;
            }
            .betting-panel, .stats-panel {
                flex: none;
                width: 100%;
            }
            .title-main {
                font-size: 22px;
                text-align: center;
                margin-bottom: 15px;
            }
            #canvasContainer {
                height: 350px;
            }
        }
    </style>

    <script>
    $(document).ready(function () {
        var hoverSound = document.getElementById("hover-sound");
        var clickSound = document.getElementById("click-sound");

        $(".themebutton").hover(function () {
            if(!$(this).is(':disabled')) hoverSound.play();
        }, function () {
            hoverSound.load();
        });

        $(".themebutton").click(function () {
            if(!$(this).is(':disabled')) clickSound.play();
        });
    });
    </script>
</head>
<body>

<audio id="hover-sound"><source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg"></audio>
<audio id="click-sound"><source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg"></audio>
<audio id="collide-sound"><source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_76.ogg" type="audio/ogg"></audio>

<div class="coreSystem">
    <div class="warp-container">
        <h1 class="title-main">GACHAPON SIMULATION</h1>

        <div class="function-wrapper">
            <div class="betting-panel section">
                <h2 class="sectionTitle">DATA CORE</h2>
                <div style="font-size: 13px; margin-bottom: 10px; font-weight: bold;">[ Enter values line by line ]</div>
                <div id="textareaContainer">
                    <textarea id="ballNames" spellcheck="false" placeholder="Enter random values">
Akiko
Asami
Fumiko
Himari 
Mei
Monika
Naomi
Natsuki
Sayori
Tomoko
Tsumugi</textarea>
                    <div id="highlightLayer"></div>
                </div>
                <button class="themebutton play-btn" id="rollButton">START GACHA</button>
            </div>

            <div class="stats-panel">
                <h2 class="sectionTitle">MACHINE SIMULATOR</h2>
                <div class="section" id="canvasContainer" style="padding: 0;">
                    <canvas id="gashaponCanvas"></canvas>
                </div>
                
                <h2 class="sectionTitle" style="margin-top: 20px;">HISTORY LOGS</h2>
                <div class="section" style="padding: 0;">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 30%;">Roll #</th>
                                    <th>Result</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
    // System Variables
    const ballColors = ['#FF6F618D', '#6B5B958D', '#88B04B8D', '#F7CAC98D', '#92A8D18D', '#FFCC5C8D', '#D4A5A58D', '#9B59B68D', '#3498DB8D', '#E67E228D'];
    const collideSound = document.getElementById('collide-sound');
    let roundCount = 0;

    // Matter.js Setup
    const { Engine, Render, World, Bodies, Body, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;

    const canvas = document.getElementById('gashaponCanvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    
    // Dynamic dimensions based on panel
    const containerWidth = canvasContainer.clientWidth;
    const containerHeight = canvasContainer.clientHeight;
    canvas.width = containerWidth;
    canvas.height = containerHeight;

    const render = Render.create({
        canvas: canvas,
        engine: engine,
        options: {
            width: containerWidth,
            height: containerHeight,
            wireframes: false,
            background: 'transparent'
        }
    });

    const bowlRadius = Math.min(containerWidth, containerHeight) * 0.4;
    const bowlCenterX = containerWidth / 2;
    const bowlCenterY = containerHeight * 0.45;
    const machineWidth = bowlRadius * 2;
    const machineHeight = containerHeight * 0.6;
    const machineX = (containerWidth - machineWidth) / 2;
    const machineY = containerHeight - machineHeight + 20;

    const segments = 128;
    const wallThickness = 10;
    const walls = [];
    for (let i = 0; i < segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const nextAngle = ((i + 1) / segments) * Math.PI * 2;
        const x1 = bowlCenterX + Math.cos(angle) * bowlRadius;
        const y1 = bowlCenterY + Math.sin(angle) * bowlRadius;
        const x2 = bowlCenterX + Math.cos(nextAngle) * bowlRadius;
        const y2 = bowlCenterY + Math.sin(nextAngle) * bowlRadius;
        const wall = Bodies.rectangle(
            (x1 + x2) / 2,
            (y1 + y2) / 2,
            Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2)),
            wallThickness,
            {
                isStatic: true,
                angle: Math.atan2(y2 - y1, x2 - x1),
                render: { fillStyle: 'rgba(100, 98, 86, 0.8)' }
            }
        );
        walls.push(wall);
    }
    World.add(world, walls);

    let balls = [];
    let ballNames = [];
    let isRolling = false;
    let selectedBall = null;
    let lastLineCount = 0;
    const ballRadius = 25;

    function drawMachine() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(100, 98, 86, 0.8)';
        ctx.fillStyle = '#ccc6b0';
        ctx.lineWidth = 2;

        // Draw Bowl
        ctx.beginPath();
        ctx.arc(bowlCenterX, bowlCenterY, bowlRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fill();

        // Draw Base
        const baseHeight = machineHeight - bowlRadius;
        ctx.beginPath();
        ctx.moveTo(machineX, machineY + bowlRadius);
        ctx.lineTo(machineX + machineWidth, machineY + bowlRadius);
        ctx.lineTo(machineX + machineWidth * 0.8, machineY + machineHeight);
        ctx.lineTo(machineX + machineWidth * 0.2, machineY + machineHeight);
        ctx.closePath();
        ctx.stroke();
        ctx.fill();

        // Draw Slot
        const slotWidth = machineWidth * 0.2;
        const slotHeight = baseHeight * 0.2;
        ctx.beginPath();
        ctx.rect(machineX + machineWidth * 0.4, machineY + machineHeight - slotHeight - 20, slotWidth, slotHeight);
        ctx.stroke();
        ctx.fillStyle = 'rgba(100, 98, 86, 0.8)';
        ctx.fill();
    }

    function resetBalls() {
        World.clear(world, false);
        World.add(world, walls);
        balls = [];
        ballNames.forEach((name, index) => {
            if (name.trim() === '') return;
            const color = ballColors[index % ballColors.length];
            const ball = Bodies.circle(
                bowlCenterX + (Math.random() - 0.5) * 10,
                bowlCenterY + (Math.random() - 0.5) * 10,
                ballRadius,
                {
                    friction: 0.1,
                    restitution: 0.5,
                    render: { fillStyle: color },
                    label: name
                }
            );
            balls.push(ball);
            World.add(world, ball);
        });
    }

    const ballNamesInput = document.getElementById('ballNames');
    const highlightLayer = document.getElementById('highlightLayer');

    function highlightDuplicates() {
        const lines = ballNamesInput.value.split('\n').map(line => line.trim());
        const lineHeight = parseFloat(getComputedStyle(ballNamesInput).lineHeight) || 24;
        const paddingTop = parseFloat(getComputedStyle(ballNamesInput).paddingTop) || 10;
        const paddingLeft = parseFloat(getComputedStyle(ballNamesInput).paddingLeft) || 10;

        highlightLayer.innerHTML = '';

        const seen = new Map();
        const duplicates = new Set();
        lines.forEach((line, index) => {
            if (line) {
                if (seen.has(line)) {
                    duplicates.add(line);
                } else {
                    seen.set(line, index);
                }
            }
        });

        lines.forEach((line, index) => {
            if (duplicates.has(line)) {
                const highlight = document.createElement('div');
                highlight.className = 'highlight-duplicate';
                highlight.style.position = 'absolute';
                highlight.style.top = `${paddingTop + index * lineHeight}px`;
                highlight.style.left = `${paddingLeft}px`;
                highlight.style.height = `${lineHeight}px`;
                highlight.style.width = `calc(100% - ${paddingLeft * 2}px)`;
                highlightLayer.appendChild(highlight);
            }
        });
        highlightLayer.style.transform = `translateY(-${ballNamesInput.scrollTop}px)`;
    }

    window.addEventListener('load', () => {
        const savedValues = localStorage.getItem('gashaponBallNames');
        if (savedValues) {
            ballNamesInput.value = savedValues;
        }
        const currentLines = ballNamesInput.value.split('\n').filter(name => name.trim() !== '');
        ballNames = currentLines;
        lastLineCount = currentLines.length;
        resetBalls();
        highlightDuplicates();
    });

    ballNamesInput.addEventListener('input', () => {
        const currentLines = ballNamesInput.value.split('\n').filter(name => name.trim() !== '');
        const currentLineCount = currentLines.length;

        if (currentLineCount > lastLineCount) {
            for (let i = lastLineCount; i < currentLineCount; i++) {
                const name = currentLines[i];
                if (name.trim() === '') continue;
                const color = ballColors[balls.length % ballColors.length];
                const ball = Bodies.circle(bowlCenterX, bowlCenterY, ballRadius, {
                    friction: 0.1, restitution: 0.5, render: { fillStyle: color }, label: name
                });
                balls.push(ball);
                World.add(world, ball);
            }
        } else if (currentLineCount < lastLineCount) {
            resetBalls();
        }

        ballNames = currentLines;
        lastLineCount = currentLineCount;
        localStorage.setItem('gashaponBallNames', ballNamesInput.value);
        highlightDuplicates();
    });

    ballNamesInput.addEventListener('scroll', () => {
        highlightLayer.style.transform = `translateY(-${ballNamesInput.scrollTop}px)`;
    });

    // Handle Nier Popup result display
    function showNierResultPopup(ball) {
        // Build custom HTML content for the module
        const contentHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px;">
                <div style="width:100px; height:100px; border-radius:50%; background:${ball.render.fillStyle}; border:4px solid var(--nier-dark); margin-bottom:15px; box-shadow: inset 0px -10px 15px rgba(0,0,0,0.3);"></div>
                <div style="font-size:32px; font-weight:bold; color:var(--nier-dark); text-transform:uppercase; text-align:center;">${ball.label.trim()}</div>
            </div>
        `;

        // Trigger module popup
        showPopup(
            "GACHAPON RESULT", 
            contentHTML, 
            [
                {
                    text: "ACCEPT",
                    action: function() {
                        playNierSound('core_52'); // Click accept sound
                        closePopup();
                    }
                }
            ]
        );

        // Play result sound (from Nier module preload)
        if (typeof playNierSound === "function") {
            try { playNierSound('core_32'); } catch(e) {}
        }

        // Add to history table
        roundCount++;
        const row = document.getElementById('historyBody').insertRow(0);
        row.innerHTML = `
            <td style="color: rgba(75, 67, 64, 0.7);">#${roundCount}</td>
            <td style="font-weight:bold; color:var(--nier-dark);">${ball.label.trim()}</td>
        `;
    }

    const rollButton = document.getElementById('rollButton');
    rollButton.addEventListener('click', () => {
        if (isRolling || balls.length === 0) return;
        
        isRolling = true;
        rollButton.disabled = true;
        rollButton.innerText = "ROLLING...";

        resetBalls();

        // Shake physics
        balls.forEach(ball => {
            Body.applyForce(ball, ball.position, {
                x: (Math.random() - 0.5) * 0.05,
                y: -0.1
            });
        });

        setTimeout(() => {
            if (balls.length > 0) {
                const randomIndex = Math.floor(Math.random() * balls.length);
                selectedBall = balls[randomIndex];
                World.remove(world, selectedBall);
                balls.splice(randomIndex, 1);
                
                showNierResultPopup(selectedBall);
            }
            isRolling = false;
            rollButton.disabled = false;
            rollButton.innerText = "START GACHA";
        }, 3000);
    });

    Events.on(engine, 'beforeUpdate', () => {
        drawMachine();
    });

    Events.on(engine, 'collisionStart', (event) => {
        const pairs = event.pairs;
        pairs.forEach((pair) => {
            if (pair.bodyA.label !== 'Rectangle Body' || pair.bodyB.label !== 'Rectangle Body') {
                const velocityA = pair.bodyA.velocity;
                const velocityB = pair.bodyB.velocity;
                const relativeVelocity = Math.sqrt(
                    Math.pow(velocityA.x - velocityB.x, 2) + Math.pow(velocityA.y - velocityB.y, 2)
                );
                const maxVelocity = 10;
                const volume = Math.min(1, Math.max(0, relativeVelocity / maxVelocity));
                
                if (volume > 0.1) {
                    collideSound.volume = volume;
                    collideSound.currentTime = 0;
                    let playPromise = collideSound.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {});
                    }
                }
            }
        });
    });

    Engine.run(engine);
    Render.run(render);
</script>
</body>
</html>
