<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>White Moon Player</title>
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-base: #c2bbbb;
            --ink-black: #1a1a1a;
            --ink-grey: #8a8a8a;
            --control-bg: rgba(0, 0, 0, 0.08);
            
            /* Font mặc định của web */
            --font-main: "Times New Roman", Times, serif;
            /* Font dành riêng cho tên bài hát */
            --font-track: 'Lora', "Noto Serif", "Yu Mincho", "Batang", serif;
            
            --moon-scale: 85%; 
            --control-scale: 0.75; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper-base);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        ::-moz-selection {
        /* Code for Firefox */
        color: #e6e6e6;
        background: rgba(85, 85, 85, 0.8);
        }

        ::selection {
        color: #e6e6e6;
        background: rgba(85, 85, 85, 0.8);
        }


        /* FILTERS */
        .master-noise { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; pointer-events: none; z-index: 100; filter: url(#fine-monochrome-filter); opacity: 0.3; transform: translateZ(0) rotate(0.01deg); }
        .coarse-fibers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; filter: url(#raw-fiber-filter); opacity: 0.4; }
        .paper-imperfections { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 10% 10%, rgba(0, 0, 0, 0.07) 0%, transparent 45%), radial-gradient(circle at 80% 90%, rgba(0, 0, 0, 0.06) 0%, transparent 40%); pointer-events: none; z-index: 1; }

        .main-wrapper {
            position: relative; display: flex; flex-direction: column;
            width: 100%; height: 100vh;
            z-index: 20; filter: contrast(1) brightness(0.9);
        }

        /* HEADER & SUBTITLES */
        header { padding: 30px 5%; display: flex; justify-content: space-between; color: var(--ink-black); flex-shrink: 0; }
        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; flex-direction: column; text-align: right; }
        
        .title-left { font-size: 36px; letter-spacing: 6px; font-weight: bold; }
        .subtitle-left { font-size: 12px; letter-spacing: 3px; margin-top: 6px; opacity: 0.7; }
        
        .title-right h1 { font-size: 32px; margin: 0; letter-spacing: 4px; font-weight: normal; }
        .subtitle-right { font-size: 12px; letter-spacing: 3px; margin-top: 6px; opacity: 0.7; }

        /* PLAYLIST */
        #playlist-container { position: absolute; left: 5%; top: 130px; width: 350px; max-height: 40vh; overflow-y: auto; z-index: 30; }
        #playlist-container::-webkit-scrollbar { width: 5px; }
        #playlist-container::-webkit-scrollbar-thumb { background: var(--ink-grey); border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: transparent !important; }

        .playlist-item {
            font-family: var(--font-track); /* ÁP DỤNG FONT MỚI */
            font-size: 16px; padding: 8px 0; color: var(--ink-grey); 
            cursor: pointer; transition: 0.2s;
            display: flex; align-items: center;
        }
        .playlist-item.active { color: var(--ink-black); font-weight: 600; border-left: 3px solid var(--ink-black); padding-left: 10px; }
        .playlist-item:hover { color: var(--ink-black); }
        
        .track-num { flex-shrink: 0; white-space: pre; font-family: var(--font-main); font-weight: normal; }
        .track-name-container { flex-grow: 1; overflow: hidden; white-space: nowrap; position: relative; transition: mask-image 0.3s; }
        .track-name { display: inline-block; }
        .faded-edge { mask-image: linear-gradient(to right, transparent 0%, black 15px, black 100%); -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15px, black 100%); }

        .moon-stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .canvas-wrapper { transform: scale(var(--moon-scale)); transform-origin: center center; display: flex; justify-content: center; align-items: center; }

        /* CỤM ĐIỀU KHIỂN */
        .bottom-control-container { width: 100%; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; z-index: 40; }
        .player-info { text-align: center; width: 1200px; }
        
        #current-title { 
            font-family: var(--font-track); /* ÁP DỤNG FONT MỚI */
            font-size: 15px; letter-spacing: 1px; color: var(--ink-black); 
            margin-bottom: 15px; font-weight: 600;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }
        
        .progress-container { width: 100%; height: 5px; background: rgba(0,0,0,0.1); cursor: pointer; position: relative; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--ink-black); width: 0%; pointer-events: none; }

        .scale-wrapper { transform: scale(var(--control-scale)); transform-origin: bottom center; display: flex; justify-content: center; }
        .control-capsule { display: inline-flex; align-items: center; gap: 40px; padding: 12px 40px; background: var(--control-bg); border-radius: 100px; color: var(--ink-grey); }
        .btn { cursor: pointer; font-size: 22px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; position: relative; }
        .btn:hover { background: rgba(0,0,0,0.1); color: var(--ink-black); }
        .btn.active { color: var(--ink-black); }

        .repeat-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
.repeat-one-badge {
            position: absolute; 
            font-family: 'Arial Black', Arial, sans-serif; /* Đổi sang font siêu đậm */
            font-size: 10px; 
            font-weight: 900; /* Ép độ đậm tối đa */
            color: var(--ink-black);
            width: 13px; /* Kích thước vừa đủ bọc số 1 */
            height: 13px; 
            border: none; /* ĐÃ BỎ BORDER THEO Ý SIR */
            border-radius: 50%; 
            display: none;
            align-items: center; 
            justify-content: center;
            top: 49%; left: 50%; 
            transform: translate(-50%, -50%);
            pointer-events: none; 
            z-index: 2;
            user-select: none;
        }

        .volume-wrapper { position: relative; }
        .volume-slider-container {
            position: absolute; bottom: 60px; left: 50%; 
            transform: translateX(-50%) scale(calc(1 / var(--control-scale))); 
            transform-origin: bottom center;
            width: 25px; height: 100px; background: var(--paper-base); border: 1px solid var(--ink-black);
            padding: 15px 0; border-radius: 8px; display: flex; flex-direction: column; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.5s, visibility 0.5s;
        }
        .volume-slider-container.show { opacity: 1; visibility: visible; }
        #volume-slider { appearance: none; width: 100px; height: 4px; background: var(--ink-grey); transform: rotate(-90deg) translate(-45px, 0); cursor: pointer; border-radius: 2px; }
        #volume-slider::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--ink-black); border-radius: 50%; }

        /* --- SHORTCUT MODAL --- */
        #shortcut-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.4);
            z-index: 1000; opacity: 0; visibility: hidden; transition: 0.5s;
        }
        #shortcut-overlay.show { opacity: 1; visibility: visible; }

        #shortcut-modal {
            position: fixed; top: -100%; left: 50%; transform: translate(-50%, -50%);
            background: var(--ink-black); color: var(--paper-base);
            padding: 35px 50px; border-radius: 12px;
            z-index: 1001; transition: top 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #shortcut-modal.show { top: 50%; } /* Trượt xuống giữa màn hình */

        #shortcut-modal h2 { margin: 0 0 25px 0; font-size: 18px; letter-spacing: 4px; border-bottom: 1px solid rgba(194, 192, 187, 0.2); padding-bottom: 15px; text-align: center;}
        
        #close-modal {
            position: absolute; top: 20px; right: 25px;
            color: var(--paper-base); font-size: 22px; cursor: pointer; transition: 0.2s;
        }
        #close-modal:hover { transform: scale(1.1); opacity: 0.8; }

        .shortcut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .sc-item { display: flex; align-items: center; font-size: 14px; letter-spacing: 1px; color: rgba(194, 192, 187, 0.9); }
        .sc-item span { margin-left: 12px; }
        
        kbd {
            background: rgba(194, 192, 187, 0.15); border: 1px solid rgba(194, 192, 187, 0.3);
            border-radius: 4px; padding: 4px 8px; font-family: monospace;
            font-size: 12px; box-shadow: 0 2px 0 rgba(194, 192, 187, 0.2);
            margin: 0 3px; color: var(--paper-base);
        }

        svg { position: absolute; width: 0; height: 0; }
    </style>
</head>

<body>
    <div class="master-noise"></div>
    <div class="coarse-fibers"></div>
    <div class="paper-imperfections"></div>

    <svg>
        <filter id="fine-monochrome-filter">
            <feTurbulence type="fractalNoise" baseFrequency="2.97" numOctaves="1" result="noise1" />
            <feTurbulence type="fractalNoise" baseFrequency="3.02" numOctaves="1" result="noise2" />
            <feBlend in="noise1" in2="noise2" mode="screen" result="noise" />
            <feColorMatrix type="saturate" values="0" result="mono" />
            <feComponentTransfer><feFuncR type="linear" slope="50" intercept="-0.2" /><feFuncG type="linear" slope="50" intercept="-0.2" /><feFuncB type="linear" slope="50" intercept="-0.2" /></feComponentTransfer>
            <feBlend in="SourceGraphic" in2="mono" mode="overlay" />
        </filter>
        <filter id="raw-fiber-filter">
            <feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="1" result="fibers" />
            <feColorMatrix type="saturate" values="0" result="monoFibers" />
            <feComponentTransfer><feFuncR type="linear" slope="50" intercept="-1.1" /><feFuncG type="linear" slope="50" intercept="-1.1" /><feFuncB type="linear" slope="50" intercept="-1.1" /></feComponentTransfer>
            <feBlend in="SourceGraphic" in2="monoFibers" mode="multiply" />
        </filter>
    </svg>

    <div id="shortcut-overlay"></div>
    <div id="shortcut-modal">
        <div id="close-modal"><i class="fa-solid fa-xmark"></i></div>
        <h2>KEYBOARD SHORTCUTS</h2>
        <div class="shortcut-grid">
            <div class="sc-item"><kbd>Space</kbd><span>Play / Pause</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>←</kbd>/<kbd>→</kbd><span>Prev / Next Song</span></div>
            <div class="sc-item"><kbd>←</kbd>/<kbd>→</kbd><span>Seek -/+ 5s</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>↑</kbd>/<kbd>↓</kbd><span>Volume Up / Down</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>S</kbd><span>Toggle Shuffle</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>L</kbd><span>Toggle Repeat</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>M</kbd><span>Mute / Unmute</span></div>
            <div class="sc-item"><kbd>Shift</kbd>+<kbd>/</kbd><span>Show Shortcuts</span></div>
        </div>
    </div>

    <div class="main-wrapper">
        <header>
            <div class="header-left">
                <div class="title-left">WHITE MOON PLAYER</div>
                <div class="subtitle-left">Aesthetic Audio Experience</div>
            </div>
            <div class="header-right">
                <div class="title-right"><h1>SERENADE SOUNDS</h1></div>
                <div class="subtitle-right">Developed by hoanganhdinhngoc</div>
            </div>
        </header>

        <div id="playlist-container" class="hide-scroll"><div id="playlist"></div></div>

        <div class="moon-stage"><div class="canvas-wrapper"><canvas id="gameCanvas"></canvas></div></div>

        <div class="bottom-control-container">
            <div class="player-info">
                <div id="current-title"></div> 
                <div class="progress-container" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

                <div class="scale-wrapper">
                    <div class="control-capsule">
                        <div class="btn" id="shuffle-btn"><i class="fa-solid fa-shuffle"></i></div>
                        <div class="btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></div>
                        <div class="btn" id="play-btn"><i class="fa-solid fa-play"></i></div>
                        <div class="btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></div>
                        <div class="btn" id="repeat-btn">
                            <div class="repeat-wrapper"><i class="fa-solid fa-repeat"></i><span class="repeat-one-badge" id="repeat-one-idx">1</span></div>
                        </div>
                        <div class="volume-wrapper" id="volume-area">
                            <div class="btn" id="mute-btn"><i class="fa-solid fa-volume-high" id="vol-icon"></i></div>
                            <div class="volume-slider-container" id="vol-popup">
                                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

<script>
    const audio = document.getElementById('main-audio');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 800;

    const songs = [
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/SYML%20-%20-In%20Between%20Breaths.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/Idea%2012.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/Ryuchi%20Sakamoto%20-%20Ieta.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/TWO%20LANES%20-%20Epilogue.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/TWO%20LANES%20-%20Frei.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/TWO%20LANES%20-%20From%20Within.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/TWO%20LANES%20-%20November.mp3" },
        { url: "https://hoanganhdinhngoc.github.io/cdn/music/TWO%20LANES%20-%20Transcend%20-%20Piano%20Version.mp3" }
    ];

    let currentIdx = -1;
    let isShuffle = false;
    let repeatMode = 0; 
    let lastVolume = 0.8; 
    let currentSpeed = 0, angle = 0;
    const targetSpeed = 0.002, accel = 0.000005;

    function formatSongTitle(url) {
        let raw = decodeURIComponent(url.split('/').pop().replace(/\.mp3$/i, ''));
        raw = raw.replace(/([^\s])-([^\s])/g, '$1 $2');
        if(raw.length > 0) raw = raw.charAt(0).toUpperCase() + raw.slice(1);
        return raw;
    }

    function initPlaylist() {
        const playlistElem = document.getElementById('playlist');
        playlistElem.innerHTML = '';
        songs.forEach((s, i) => {
            const fullName = formatSongTitle(s.url);
            let isLong = fullName.length > 35;
            let displayName = isLong ? fullName.substring(0, 35) + '...' : fullName;

            const item = document.createElement('div');
            item.className = 'playlist-item';
            
            const numSpan = document.createElement('span');
            numSpan.className = 'track-num';
            numSpan.innerText = (i + 1) + ". ";
            
            const nameContainer = document.createElement('div');
            nameContainer.className = 'track-name-container';
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'track-name';
            nameSpan.innerText = displayName;
            
            nameContainer.appendChild(nameSpan);
            item.appendChild(numSpan);
            item.appendChild(nameContainer);

            item.onmouseenter = () => {
                if (isLong) {
                    nameSpan.innerText = fullName;
                    nameContainer.classList.add('faded-edge');
                    const overflow = nameSpan.scrollWidth - nameContainer.clientWidth;
                    if (overflow > 0) {
                        const duration = Math.min(5, overflow / 20);
                        nameSpan.style.transition = `transform ${duration}s linear`;
                        nameSpan.style.transform = `translateX(-${overflow}px)`;
                    }
                }
            };
            
            item.onmouseleave = () => {
                if (isLong) {
                    nameSpan.style.transition = 'none';
                    nameSpan.style.transform = 'translateX(0)';
                    nameSpan.innerText = displayName;
                    nameContainer.classList.remove('faded-edge');
                }
            };

            item.onclick = () => loadSong(i);
            playlistElem.appendChild(item);
        });
    }

    const playlistContainer = document.getElementById('playlist-container');
    let scrollTimer;
    playlistContainer.onscroll = () => {
        playlistContainer.classList.remove('hide-scroll');
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => playlistContainer.classList.add('hide-scroll'), 5000);
    };

    function loadSong(idx) {
        currentIdx = idx;
        audio.src = songs[idx].url;
        
        const titleEl = document.getElementById('current-title');
        titleEl.style.opacity = 0; 
        setTimeout(() => {
            titleEl.innerText = formatSongTitle(songs[idx].url);
            titleEl.style.opacity = 1; 
        }, 500); 

        document.querySelectorAll('.playlist-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
            el.style.color = (i === idx) ? 'var(--ink-black)' : 'var(--ink-grey)';
        });
        
        audio.play();
        updatePlayIcon(true);
    }

    function updatePlayIcon(playing) {
        document.getElementById('play-btn').innerHTML = playing ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
    }

    document.getElementById('play-btn').onclick = () => {
        if (currentIdx === -1) return loadSong(0);
        if (audio.paused) audio.play(); else audio.pause();
        updatePlayIcon(!audio.paused);
    };

    function nextSong() {
        let next = isShuffle ? Math.floor(Math.random() * songs.length) : (currentIdx + 1) % songs.length;
        loadSong(next);
    }

    document.getElementById('next-btn').onclick = nextSong;
    document.getElementById('prev-btn').onclick = () => {
        if (audio.currentTime > 5) audio.currentTime = 0;
        else loadSong((currentIdx - 1 + songs.length) % songs.length);
    };

    const progressBar = document.getElementById('progress-bar');
    progressBar.onmousedown = (e) => {
        const scrub = (ev) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
            audio.currentTime = pos * audio.duration;
        };
        scrub(e); document.onmousemove = scrub; document.onmouseup = () => document.onmousemove = null;
    };

    audio.ontimeupdate = () => {
        if (!audio.duration) return;
        document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + "%";
    };

    audio.onended = () => { if (repeatMode === 2) { audio.currentTime = 0; audio.play(); } else if (repeatMode === 1 || currentIdx < songs.length - 1) nextSong(); };

    // --- VOLUME LOGIC ---
    const volArea = document.getElementById('volume-area');
    const volPopup = document.getElementById('vol-popup');
    const volIcon = document.getElementById('vol-icon');
    const volSlider = document.getElementById('volume-slider');
    let volHideTimer;

    function showVolumeBar() {
        clearTimeout(volHideTimer);
        volPopup.classList.add('show');
    }

function hideVolumeBar(delay = 100) {
        clearTimeout(volHideTimer);
        volHideTimer = setTimeout(() => { volPopup.classList.remove('show'); }, delay);
    }

    volArea.onmouseenter = showVolumeBar;
    volArea.onmouseleave = () => hideVolumeBar(100);

    function updateVolumeIcon(vol) {
        if (vol == 0) volIcon.className = 'fa-solid fa-volume-xmark';
        else if (vol < 0.5) volIcon.className = 'fa-solid fa-volume-low';
        else volIcon.className = 'fa-solid fa-volume-high';
    }

    function toggleMute() {
        if (audio.volume > 0) {
            lastVolume = audio.volume;
            audio.volume = 0;
        } else {
            audio.volume = lastVolume;
        }
        volSlider.value = audio.volume;
        updateVolumeIcon(audio.volume);
    }

    document.getElementById('mute-btn').onclick = toggleMute;

    volSlider.oninput = (e) => {
        audio.volume = e.target.value;
        if (audio.volume > 0) lastVolume = audio.volume;
        updateVolumeIcon(audio.volume);
    };

    // --- REPEAT & SHUFFLE ---
    document.getElementById('shuffle-btn').onclick = () => { isShuffle = !isShuffle; document.getElementById('shuffle-btn').classList.toggle('active', isShuffle); };
    document.getElementById('repeat-btn').onclick = () => {
        repeatMode = (repeatMode + 1) % 3;
        const btn = document.getElementById('repeat-btn');
        const badge = document.getElementById('repeat-one-idx');
        btn.classList.toggle('active', repeatMode > 0);
        badge.style.display = (repeatMode === 2) ? 'flex' : 'none';
    };

    // --- MODAL LOGIC ---
    const overlay = document.getElementById('shortcut-overlay');
    const modal = document.getElementById('shortcut-modal');
    
    function toggleModal() {
        const isShowing = overlay.classList.contains('show');
        if (isShowing) {
            overlay.classList.remove('show');
            modal.classList.remove('show');
        } else {
            overlay.classList.add('show');
            modal.classList.add('show');
        }
    }
    
    overlay.onclick = toggleModal;
    document.getElementById('close-modal').onclick = toggleModal;

    // --- SHORTCUTS TỔNG HỢP ---
    window.onkeydown = (e) => {
        // Tắt Modal bằng ESC
        if (e.key === "Escape" && overlay.classList.contains('show')) {
            toggleModal();
            return;
        }

        // Bật Modal bằng Shift + ? (Slash)
        if (e.shiftKey && (e.key === "?" || e.code === "Slash")) {
            e.preventDefault();
            toggleModal();
            return;
        }

        // Nếu Modal đang mở thì không nhận các phím khác
        if (overlay.classList.contains('show')) return;

        // Play/Pause bằng Space
        if (e.code === "Space") { e.preventDefault(); document.getElementById('play-btn').click(); }
        
        // Tua nhạc tới lui 5s (CHỈ KHI KHÔNG NHẤN SHIFT VÀ NHẠC ĐANG PHÁT)
        if (!e.shiftKey && currentIdx !== -1) {
            if (e.key === "ArrowRight") { e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
            if (e.key === "ArrowLeft") { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); }
        }

        // Cụm phím có Shift
        if (e.shiftKey) {
            if (e.key === "ArrowRight") nextSong();
            if (e.key === "ArrowLeft") document.getElementById('prev-btn').click();
            if (e.key === "ArrowUp") { 
                e.preventDefault();
                audio.volume = Math.min(1, audio.volume + 0.1); 
                volSlider.value = audio.volume; updateVolumeIcon(audio.volume);
                showVolumeBar(); hideVolumeBar(500); 
            }
            if (e.key === "ArrowDown") { 
                e.preventDefault();
                audio.volume = Math.max(0, audio.volume - 0.1); 
                volSlider.value = audio.volume; updateVolumeIcon(audio.volume);
                showVolumeBar(); hideVolumeBar(500); 
            }
            if (e.key.toLowerCase() === "s") document.getElementById('shuffle-btn').click();
            if (e.key.toLowerCase() === "l") document.getElementById('repeat-btn').click();
            if (e.key.toLowerCase() === "m") { e.preventDefault(); toggleMute(); }
        }
    };

    // --- MOON RENDER ---
    const moonPhases = [100, 67, 45, 25, 0, -75, -45, -30];
    function drawMoon(ctx, x, y, size, percent) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#1a1a1a"; ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI * 2); ctx.stroke();
        const absP = Math.abs(percent);
        if (absP > 0) {
            let r = (absP - 50) / 50;
            ctx.beginPath();
            if (percent >= 0) { ctx.arc(0, 0, size, Math.PI/2, 3*Math.PI/2, false); ctx.ellipse(0, 0, size * Math.abs(r), size, 0, 3*Math.PI/2, Math.PI/2, r < 0); }
            else { ctx.arc(0, 0, size, 3*Math.PI/2, Math.PI/2, false); ctx.ellipse(0, 0, size * Math.abs(r), size, 0, Math.PI/2, 3*Math.PI/2, r > 0); }
            ctx.fill();
        }
        ctx.globalCompositeOperation = 'destination-out';
        for (let i = 0; i < 6; i++) { ctx.beginPath(); ctx.arc((Math.random()-0.5)*size*1.6, (Math.random()-0.5)*size*1.6, 0.4, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let isEnding = audio.duration && (audio.duration - audio.currentTime) < 5; 
        if (!audio.paused && !isEnding) { if (currentSpeed < targetSpeed) currentSpeed += accel; }
        else { if (currentSpeed > 0) currentSpeed -= accel; if (currentSpeed < 0) currentSpeed = 0; }
        angle += currentSpeed;
        for (let i = 0; i < 8; i++) {
            const a = angle + (i * Math.PI * 2) / 8;
            drawMoon(ctx, 400 + Math.cos(a)*160, 400 + Math.sin(a)*160, 13, moonPhases[i]);
        }
        requestAnimationFrame(animate);
    }

    initPlaylist();
    animate();
</script>
