    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #850000;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
            --nier-error-red: #850000;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }
        ::selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }

        body {
            font-family: 'Montserrat', sans-serif; background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px; color: var(--nier-dark); min-height: 100vh;
        }
        
        body.no-scroll { overflow: hidden !important; }

        .coreSystem { display: inline-block; width: 100%; min-height: 100vh; box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3); padding: 20px; }
        .warp-container { margin-top: 1em; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .title-main { font-size: 26px; text-shadow: 4px 5px rgba(162, 156, 142, .8); margin-bottom: 30px; text-transform: uppercase; padding-left: 10px; }
        .function-wrapper { display: flex; flex-direction: row; gap: 2em; align-items: stretch; }
        .section { background: var(--nier-panel); box-shadow: 2px 2px 1px #4f4b42; padding: 25px; display: flex; flex-direction: column; }
        .input-panel { flex: 0 0 600px; } .result-panel { flex: 1; min-width: 0; }
        .sectionTitle { padding: 10px 15px; color: #d3cebb; background: rgba(100, 98, 86, 0.8); font-weight: bold; margin-bottom: 20px; font-size: 14px; text-transform: uppercase; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 900px) {
            .function-wrapper { flex-direction: column; }
            .input-panel { flex: none; width: 100%; }
            .result-panel { width: 100%; }
            #previewWrapper { height: 45vh !important; }
            .title-main { text-align: center; font-size: 22px; padding-left: 0; }
            .gallery-nav { width: 25vw !important; }
            #galleryPrev { width: calc(8vw + 15px) !important; padding-left: calc(8% + 15px) !important; }
            #galleryNext { width: calc(8vw + 15px) !important; padding-right: calc(8% + 15px) !important; }
            .dropzone { padding: 30px 15px; }
            .coreSystem { padding: 10px; }
            .section { padding: 15px; }
        }

        /* --- UPLOAD ZONE --- */
        .dropzone { width: 100%; padding: 40px 20px; border: 2px dashed var(--nier-dark); background: rgba(216, 210, 186, 0.3); text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
        .dropzone.hover { background: rgba(100, 98, 86, 0.2); border-color: var(--nier-bg-btn); }
        .dropzone p { font-weight: bold; font-size: 14px; }
        .dropzone small { font-size: 11px; opacity: 0.8; }
        #fileInput { display: none; }

        /* --- THUMBNAILS GRID & DRAG ANIMATIONS --- */
        .thumb-grid { display: flex; flex-wrap: wrap; gap: 25px 15px; min-height: 150px; background: rgba(100, 98, 86, 0.1); padding: 15px; border: 1px solid var(--nier-dark); align-content: flex-start; }
        
        .thumb-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 100px;
            transition: all 5ms linear; transform-origin: center left; overflow: visible; 
        }
        
        .thumb-wrapper.removing { 
            width: 0 !important; margin: 0 !important; padding: 0 !important;
            opacity: 0; overflow: hidden !important; 
        }
        .thumb-wrapper.removing * { display: none !important; }

        .thumb-box {
            width: 100%; height: 130px; border: 2px solid var(--nier-dark); background: #000;
            position: relative; cursor: grab; display: flex; flex-direction: column;
            box-shadow: 2px 2px 1px #4f4b42; margin-bottom: 8px; flex-shrink: 0;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .thumb-name {
            color: var(--nier-dark); font-size: 11px; font-weight: bold; text-align: center;
            width: 100%; line-height: 1.4; padding: 0 2px;
            white-space: normal; word-wrap: break-word; pointer-events: none;
        }

        .thumb-checkbox { position: absolute; top: -5px; left: -5px; width: 18px; height: 18px; cursor: pointer; z-index: 5; accent-color: var(--nier-dark); box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .thumb-delete {
            position: absolute; top: -5px; right: -5px; width: 24px; height: 24px;
            background: transparent; color: rgba(75, 67, 64, 0.4); 
            border: 1px solid rgba(75, 67, 64, 0.4); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 5;
            opacity: 0; transition: all 0.2s; box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Hiệu ứng Hover Delete cho Desktop */
        .thumb-wrapper:hover .thumb-delete { opacity: 1; }
        
        /* Hiệu ứng Click Delete cho Mobile (khi click vào grid) */
        .show-delete-mobile .thumb-delete { opacity: 1 !important; }

        .thumb-delete:hover { 
            background: rgba(216, 210, 186, 0.9) !important; color: var(--nier-error-red) !important; 
            border-color: var(--nier-error-red) !important; transform: scale(1.1); 
        }

        /* --- Sortable Customization (FIX DRAG BẸP DÍ) --- */
        .nier-drag .thumb-box, .nier-fallback .thumb-box { 
            transform: rotate(4deg) scale(1.05); 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); 
            border-color: var(--nier-beige); 
        }
        /* Fallback class cho item đang được nhấc lên bởi ngón tay (Mobile) */
        .nier-fallback { 
            opacity: 0.9 !important; 
            z-index: 99999 !important; 
            cursor: grabbing !important; 
            width: 100px !important; 
        }
        
        /* Ghost là ô trống mờ mờ ở chỗ cũ, nơi ảnh sẽ được thả xuống */
        .nier-ghost {
            opacity: 0.4 !important; visibility: visible !important; 
            background: rgba(100, 98, 86, 0.2); border: 2px dashed var(--nier-dark); box-shadow: none;
            overflow: visible; display: flex; align-items: center; justify-content: center;
            position: relative; height: 130px !important; width: 100px !important; margin-bottom: auto; 
            border-radius: 2px;
        }
        .nier-ghost * { display: none !important; }
        .nier-ghost::after {
            content: attr(data-slot); font-family: 'Montserrat', sans-serif; font-size: 45px; font-weight: bold;
            color: rgba(75, 67, 64, 0.4); text-shadow: 1px 1px 2px rgba(216, 210, 186, 0.8);
            position: absolute; top: 35px;
        }

        /* --- DYNAMIC PREVIEW PANEL --- */
        #previewWrapper { 
            width: 100%; height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .preview-box {
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); border: 2px solid var(--nier-dark);
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            position: relative; margin-bottom: 0px; cursor: pointer; overflow: hidden;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .preview-box img { width: 100%; height: 100%; object-fit: contain; display: none; transition: transform 0.2s; }
        .preview-box:hover img { transform: scale(1.02); }
        .preview-box p.placeholder { color: #d3cebb; font-size: 12px; opacity: 0.5; text-transform: uppercase; pointer-events: none; }
        .preview-name-outside { color: var(--nier-dark); font-size: 13px; font-weight: bold; text-align: center; width: 100%; word-wrap: break-word; display: none; margin-top: 15px; }

        /* --- BUTTONS --- */
        .themebutton {
            cursor: pointer; padding: 12px 20px; font-weight: bold; color: #4b4340; border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%); background-size: 200% 100%;
            background-position: right bottom; transition: all .2s ease-out; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; text-align: center; width: 100%; margin-top: 15px;
        }
        .themebutton:hover:not(:disabled) { color: #d3cebb; background-position: left bottom; }

        /* --- GALLERY OVERLAY --- */
        #galleryOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000; flex-direction: column; perspective: 1500px;
            opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; 
        }
        #galleryOverlay.show { opacity: 1; visibility: visible; }
        
        .gallery-main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: default; }
        
        .gallery-img-container {
            position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: all 0.1s ease-out; pointer-events: none;
        }
        .gallery-img-container img { max-width: 95%; max-height: 85%; object-fit: contain; pointer-events: auto; }

        .anim-out-left { transform: translateX(-50vw) rotateY(-45deg); opacity: 0; }
        .anim-in-right { transform: translateX(50vw) rotateY(45deg); opacity: 0; }
        .anim-out-right { transform: translateX(50vw) rotateY(45deg); opacity: 0; }
        .anim-in-left { transform: translateX(-50vw) rotateY(-45deg); opacity: 0; }
        .anim-center { transform: translateX(0) rotateY(0); opacity: 1; }

        .gallery-nav {
            position: absolute; top: 0; bottom: 80px; width: 15vw;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.2); font-size: 45px; cursor: pointer; transition: 0.2s; z-index: 10000;
            transform: translateZ(0); 
        }
        #galleryPrev { left: -15px; width: calc(8vw + 15px); justify-content: flex-start; padding-left: calc(3% + 15px); }
        #galleryPrev:hover { 
            background: radial-gradient(ellipse 100% 40% at 15px center, rgba(216,210,186,0.2) 0%, transparent 100%); 
            color: rgba(216, 210, 186, 0.8); 
        }
        
        #galleryNext { right: -15px; width: calc(8vw + 15px); justify-content: flex-end; padding-right: calc(3% + 15px); }
        #galleryNext:hover { 
            background: radial-gradient(ellipse 100% 40% at calc(100% - 15px) center, rgba(216,210,186,0.2) 0%, transparent 100%); 
            color: rgba(216, 210, 186, 0.8); 
        }
        
        .gallery-close { position: absolute; top: 25px; right: 35px; color: rgba(216, 210, 186, 0.5); font-size: 35px; cursor: pointer; z-index: 10005; padding: 10px; transition: color 0.2s;}
        .gallery-close:hover { color: #ffffff; }

        .gallery-counter { position: absolute; bottom: 110px; width: 100%; text-align: center; color: #fff; font-size: 14px; font-weight: bold; z-index: 10; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        .gallery-strip { height: 80px; width: 100%; background: rgba(20, 20, 20, 0.9); border-top: 1px solid var(--nier-dark); display: flex; align-items: center; gap: 10px; padding: 0 20px; overflow-x: auto; z-index: 10; }
        .gallery-thumb { width: 50px; height: 60px; border: 2px solid transparent; opacity: 0.5; cursor: pointer; transition: 0.2s; object-fit: cover; }
        .gallery-thumb:hover { opacity: 0.8; }
        .gallery-thumb.active { border-color: var(--nier-beige); opacity: 1; transform: scale(1.1); }

        /* --- NIER POPUP --- */
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 9998; }
        .popupSection { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: rgba(216, 210, 186, .95); color: #4b4340; box-shadow: 2px 2px 10px #4f4b42; z-index: 9999; }
        .popupSectionTitle { padding: 12px 15px; background: rgba(68, 66, 60, 0.98); color: #d3cebb; font-size: 14px; font-weight: bold; text-transform: uppercase; margin: 0; }
        .boxContent { padding: 25px 20px; text-align: center; }
        .boxContent p { line-height: 1.6; margin-bottom: 25px; font-weight: 500; font-size: 14px; }
        .popup-controls { display: flex; gap: 10px; justify-content: center; }
        .popup-btn { width: auto; min-width: 120px; margin-top: 0; }
        .progress-container { width: 100%; border: 2px solid var(--nier-dark); background: rgba(100, 98, 86, 0.2); height: 30px; position: relative; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--nier-dark); transition: width 0.2s ease; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d3cebb; font-weight: bold; font-size: 12px; mix-blend-mode: difference; }
        .toolzone { width: 100%; padding: 12px; font-family: 'Montserrat', sans-serif; font-size: 14px; border: 2px solid var(--nier-dark); background: rgba(216, 210, 186, .5); color: #4b4340; outline: none; margin-bottom: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="hover-sound" src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg"></audio>
    <audio id="click-sound" src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg"></audio>
    <audio id="action-sound" src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_58.ogg"></audio>
    <audio id="core1-sound" src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_1.ogg"></audio>
    <audio id="delete-sound" src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_76.ogg"></audio>

    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popupSection" id="customPopup">
        <h2 class="popupSectionTitle" id="popupTitle">System Alert</h2>
        <div class="boxContent" id="popupBody"></div>
    </div>

    <div id="galleryOverlay">
        <i class="fas fa-times gallery-close" id="galleryClose"></i>
        <div class="gallery-nav" id="galleryPrev"><i class="fas fa-chevron-left"></i></div>
        <div class="gallery-nav" id="galleryNext"><i class="fas fa-chevron-right"></i></div>
        
        <div class="gallery-main" id="galleryMain">
            <div class="gallery-img-container anim-center" id="galleryImgContainer">
                <img src="" id="galleryMainImg">
            </div>
        </div>

        <div class="gallery-counter" id="galleryCounterText">1 / 1</div>
        <div class="gallery-strip" id="galleryStrip"></div>
    </div>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">Image to PDF</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Data Input & Sequence</h2>
                    <div class="dropzone" id="dropZone">
                        <p>CLICK HERE OR DROP IMAGES TO UPLOAD</p>
                        <small>(Supported: JPG, PNG, WEBP)</small>
                        <input type="file" id="fileInput" multiple accept="image/*">
                    </div>
                    <div class="thumb-grid" id="thumbGrid"></div>
                    <button id="convertBtn" class="themebutton">Convert to PDF</button>
                </div>

                <div class="result-panel">
                    <div class="section" style="height: 100%;">
                        <h2 class="sectionTitle">Target Preview</h2>
                        <div id="previewWrapper">
                            <div class="preview-box" id="mainPreviewBox">
                                <p class="placeholder" id="previewPlaceholder">Select an image to inspect.</p>
                                <img id="mainPreviewImg" src="">
                            </div>
                        </div>
                        <div class="preview-name-outside" id="mainPreviewName"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        const clickSound = document.getElementById("click-sound");
        const actionSound = document.getElementById("action-sound");
        const core1Sound = document.getElementById("core1-sound");
        const deleteSound = document.getElementById("delete-sound");
        
        let uploadedFiles = []; 
        let generatedPdfBlob = null;
        let isPopupActive = false; 
        let currentPreviewData = null; 
        
        // --- NÂNG CẤP SORTABLEJS (Kéo thả mượt mà trên Mobile) ---
        const sortableGrid = new Sortable(document.getElementById('thumbGrid'), {
            animation: 200, 
            ghostClass: 'nier-ghost', 
            dragClass: 'nier-drag',
            fallbackClass: 'nier-fallback',
            forceFallback: true, 
            fallbackOnBody: true, // GIÚP ELEMENT DRAG BÁM SÁT THEO ĐÚNG NGÓN TAY VÀ KHÔNG BỊ LỆCH TỌA ĐỘ
            delay: 100, // Touch 100ms để active kéo thả (nhanh hơn theo ý anh)
            delayOnTouchOnly: true, // Delay kéo thả chỉ áp dụng trên Touch 
            onStart: function(evt) { evt.item.setAttribute('data-slot', evt.oldIndex + 1); },
            onChange: function(evt) {
                if(evt.item) evt.item.setAttribute('data-slot', evt.newIndex + 1);
            }
        });

        // Event toàn cục: Bấm vào ảnh thì hiện TẤT CẢ nút X (Delete). Bấm chỗ khác tàng hình nút X
        document.addEventListener('click', (e) => {
            const grid = document.getElementById('thumbGrid');
            if (grid) {
                if (e.target.closest('.thumb-wrapper')) {
                    grid.classList.add('show-delete-mobile');
                } else {
                    grid.classList.remove('show-delete-mobile');
                }
            }
        });

        $(document).on('mouseenter', '.themebutton:not(:disabled), .thumb-box, .dropzone, .gallery-nav, .gallery-thumb, .gallery-close', () => { 
            hoverSound.currentTime = 0; hoverSound.play(); 
        });

        function openPopup() { 
            isPopupActive = true;
            $('#popupOverlay').fadeIn(200); $('#customPopup').fadeIn(200); 
        }
        function closePopup() { 
            $('#popupOverlay').fadeOut(200); $('#customPopup').fadeOut(200);
            isPopupActive = false;
            generatedPdfBlob = null; 
        }

        $('#popupOverlay').click(function() {
            if(isPopupActive) {
                core1Sound.currentTime = 0; core1Sound.play();
                closePopup();
            }
        });

        function showSystemAlert(msg) {
            $('#popupTitle').text('SYSTEM ALERT');
            $('#popupBody').html(`
                <p>${msg}</p>
                <div class="popup-controls">
                    <button class="themebutton popup-btn" id="alertOkayBtn">OKAY</button>
                </div>
            `);
            openPopup();
            
            $('#alertOkayBtn').click(function() {
                core1Sound.currentTime = 0; core1Sound.play();
                closePopup();
            });
        }

        function showProgressPopup() {
            isPopupActive = false; 
            $('#popupTitle').text('PROCESSING DATA...');
            $('#popupBody').html(`<p>Compiling document structure...</p><div class="progress-container"><div id="pdfProgressBar" class="progress-bar"></div><div id="pdfProgressText" class="progress-text">STANDBY 0%</div></div>`);
            $('#popupOverlay').fadeIn(200); $('#customPopup').fadeIn(200); 
        }

        function showDownloadPopup(defaultName) {
            isPopupActive = true;
            $('#popupTitle').text('CONVERSION COMPLETE');
            $('#popupBody').html(`
                <p>Document compiled. Assign a registry name:</p>
                <input type="text" id="pdfFileName" class="toolzone" value="${defaultName}">
                <div class="popup-controls">
                    <button id="downloadPdfBtn" class="themebutton popup-btn" style="background-color: var(--nier-dark); color: #d3cebb;">DOWNLOAD</button>
                    <button id="startOverBtn" class="themebutton popup-btn">START OVER</button>
                </div>
            `);
            openPopup();

            $('#downloadPdfBtn').click(function() {
                actionSound.currentTime = 0; actionSound.play();
                let fileName = $('#pdfFileName').val().trim() || defaultName;
                if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';
                const link = document.createElement('a');
                const url = URL.createObjectURL(generatedPdfBlob);
                link.href = url; link.download = fileName;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
            });

            $('#startOverBtn').click(function() { 
                clickSound.currentTime = 0; 
                clickSound.play(); 
                setTimeout(() => { location.reload(); }, 300); 
            });
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => { clickSound.play(); fileInput.click(); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('hover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); fileInput.value = ''; });

        function handleFiles(files) {
            let newFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if(newFiles.length === 0) return;

            let fileDataArray = newFiles.map(file => {
                return {
                    id: 'img_' + Date.now() + Math.random().toString(36).substr(2,9), 
                    name: file.name, 
                    dataUrl: URL.createObjectURL(file), 
                    checked: true 
                };
            });

            uploadedFiles = uploadedFiles.concat(fileDataArray);
            renderThumbnails(fileDataArray); 
        }

        function resizePreviewBox(naturalWidth, naturalHeight) {
            let wrap = document.getElementById('previewWrapper');
            let box = document.getElementById('mainPreviewBox');
            
            let wrapW = wrap.clientWidth;
            let wrapH = wrap.clientHeight;
            
            let scale = Math.min(wrapW / naturalWidth, wrapH / naturalHeight);
            
            let targetW = naturalWidth * scale;
            let targetH = naturalHeight * scale;
            
            box.style.width = targetW + 'px';
            box.style.height = targetH + 'px';
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            if (currentPreviewData) {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    let box = document.getElementById('mainPreviewBox');
                    box.style.transition = 'none';
                    resizePreviewBox(currentPreviewData.w, currentPreviewData.h);
                    void box.offsetWidth; 
                    box.style.transition = 'width 0.4s cubic-bezier(0.25, 1, 0.5, 1), height 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                }, 100);
            }
        });

        function renderThumbnails(filesToRender) {
            const grid = document.getElementById('thumbGrid');
            if(grid.innerHTML.includes("No images")) grid.innerHTML = '';
            
            const fragment = document.createDocumentFragment();

            filesToRender.forEach(file => {
                let displayName = file.name;
                if(displayName.length > 56) displayName = displayName.substring(0, 53) + '...';

                const wrapper = document.createElement('div');
                wrapper.className = 'thumb-wrapper';
                wrapper.dataset.id = file.id;

                wrapper.innerHTML = `
                    <div class="thumb-box">
                        <input type="checkbox" class="thumb-checkbox" checked>
                        <div class="thumb-delete" title="Remove"><i class="fas fa-times"></i></div>
                        <img src="${file.dataUrl}">
                    </div>
                    <div class="thumb-name" title="${file.name}">${displayName}</div>
                `;

                const cb = wrapper.querySelector('.thumb-checkbox');
                cb.addEventListener('click', (e) => { e.stopPropagation(); file.checked = e.target.checked; clickSound.currentTime=0; clickSound.play(); });

                const delBtn = wrapper.querySelector('.thumb-delete');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    deleteSound.currentTime = 0; 
                    deleteSound.play(); 
                    wrapper.classList.add('removing');
                    setTimeout(() => { 
                        wrapper.remove(); 
                        URL.revokeObjectURL(file.dataUrl); 
                        uploadedFiles = uploadedFiles.filter(f => f.id !== file.id); 
                    }, 5);
                });

                const box = wrapper.querySelector('.thumb-box');
                box.addEventListener('click', (e) => {
                    if(e.target.classList.contains('thumb-delete') || e.target.classList.contains('thumb-checkbox')) return;
                    clickSound.currentTime=0; clickSound.play();
                    
                    document.getElementById('previewPlaceholder').style.display = 'none';
                    
                    let imgPre = new Image();
                    imgPre.onload = function() {
                        currentPreviewData = { w: this.naturalWidth, h: this.naturalHeight };
                        resizePreviewBox(this.naturalWidth, this.naturalHeight);

                        document.getElementById('mainPreviewImg').src = file.dataUrl;
                        document.getElementById('mainPreviewImg').style.display = 'block';
                        document.getElementById('mainPreviewName').textContent = file.name; 
                        document.getElementById('mainPreviewName').style.display = 'block';
                    }
                    imgPre.src = file.dataUrl;
                });

                fragment.appendChild(wrapper);
            });
            grid.appendChild(fragment);
        }

        function getCurrentSequence() {
            const currentUI = [];
            document.querySelectorAll('.thumb-wrapper').forEach(el => {
                const id = el.dataset.id;
                const fileObj = uploadedFiles.find(f => f.id === id);
                if (fileObj && !el.classList.contains('removing')) currentUI.push(fileObj);
            });
            return currentUI;
        }

        function getCheckedSequence() {
            return getCurrentSequence().filter(f => {
                const el = document.querySelector(`.thumb-wrapper[data-id="${f.id}"] .thumb-checkbox`);
                return el && el.checked;
            });
        }

        let galleryImages = [];
        let galleryIndex = 0;
        let isAnimating = false;

        document.getElementById('mainPreviewBox').addEventListener('click', () => {
            const src = document.getElementById('mainPreviewImg').src;
            if(!src || src.includes(window.location.host + window.location.pathname)) return; 
            
            core1Sound.currentTime = 0; core1Sound.play();

            galleryImages = getCurrentSequence(); 
            galleryIndex = galleryImages.findIndex(img => img.dataUrl === src);
            if(galleryIndex === -1) galleryIndex = 0;

            openGallery();
        });

        function openGallery() {
            document.body.classList.add('no-scroll');
            $('#galleryOverlay').css('display', 'flex');
            setTimeout(() => { $('#galleryOverlay').addClass('show'); }, 10);
            updateGalleryStrip();
            renderGalleryImage(galleryImages[galleryIndex].dataUrl, 'none');
        }

        function closeGallery() {
            core1Sound.currentTime = 0; core1Sound.play();
            $('#galleryOverlay').removeClass('show');
            setTimeout(() => { 
                $('#galleryOverlay').css('display', 'none');
                document.body.classList.remove('no-scroll');
            }, 200);
        }

        document.getElementById('galleryClose').addEventListener('click', closeGallery);
        document.getElementById('galleryMain').addEventListener('click', (e) => {
            // Chỉ đóng nếu click vào nền (không đóng nếu click vào vùng chuyển ảnh hoặc chính bức ảnh)
            if(e.target.id === 'galleryMain') closeGallery();
        });

        // --- TÍNH NĂNG VUỐT TRÊN MOBILE CHO GALLERY ---
        let touchStartX = 0;
        let touchEndX = 0;
        
        const galleryMainElem = document.getElementById('galleryMain');
        
        galleryMainElem.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        galleryMainElem.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            let swipeDistance = touchStartX - touchEndX;
            
            // Nếu khoảng cách vuốt > 40px thì mới tính là vuốt (chống click nhầm)
            if (swipeDistance > 40 && galleryIndex < galleryImages.length - 1) {
                navigateGallery(galleryIndex + 1); // Vuốt sang trái -> Xem ảnh tiếp theo
            } else if (swipeDistance < -40 && galleryIndex > 0) {
                navigateGallery(galleryIndex - 1); // Vuốt sang phải -> Xem ảnh trước đó
            }
        }, {passive: true});
        // ----------------------------------------------

        function updateGalleryStrip() {
            const strip = document.getElementById('galleryStrip');
            strip.innerHTML = '';
            
            document.getElementById('galleryCounterText').textContent = `${galleryIndex + 1} / ${galleryImages.length}`;

            galleryImages.forEach((img, idx) => {
                const thumb = document.createElement('img');
                thumb.src = img.dataUrl;
                thumb.className = 'gallery-thumb' + (idx === galleryIndex ? ' active' : '');
                thumb.onclick = () => { if(!isAnimating && idx !== galleryIndex) navigateGallery(idx); };
                strip.appendChild(thumb);
            });
            const activeThumb = strip.querySelector('.active');
            if(activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function navigateGallery(targetIndex) {
            if(isAnimating) return;
            hoverSound.currentTime = 0; hoverSound.play();
            
            let direction = targetIndex > galleryIndex ? 'right' : 'left';
            galleryIndex = targetIndex;
            
            updateGalleryStrip();
            renderGalleryImage(galleryImages[galleryIndex].dataUrl, direction);
        }

        document.getElementById('galleryNext').addEventListener('click', () => {
            if(galleryIndex < galleryImages.length - 1) navigateGallery(galleryIndex + 1);
        });
        document.getElementById('galleryPrev').addEventListener('click', () => {
            if(galleryIndex > 0) navigateGallery(galleryIndex - 1);
        });

        document.addEventListener('keydown', (e) => {
            if ($('#galleryOverlay').hasClass('show')) {
                if (e.key === 'ArrowRight' && galleryIndex < galleryImages.length - 1) navigateGallery(galleryIndex + 1);
                if (e.key === 'ArrowLeft' && galleryIndex > 0) navigateGallery(galleryIndex - 1);
                if (e.key === 'Escape') closeGallery();
            }
        });

        function renderGalleryImage(newSrc, direction) {
            const container = document.getElementById('galleryMain');
            const oldImgCont = document.getElementById('galleryImgContainer');
            
            if(direction === 'none') {
                if(oldImgCont) oldImgCont.querySelector('img').src = newSrc;
                return;
            }

            isAnimating = true;
            const newImgCont = document.createElement('div');
            newImgCont.className = 'gallery-img-container ' + (direction === 'right' ? 'anim-in-right' : 'anim-in-left');
            const img = document.createElement('img'); img.src = newSrc;
            newImgCont.appendChild(img);
            container.appendChild(newImgCont);

            void newImgCont.offsetWidth; 

            oldImgCont.className = 'gallery-img-container ' + (direction === 'right' ? 'anim-out-left' : 'anim-out-right');
            newImgCont.className = 'gallery-img-container anim-center';

            setTimeout(() => {
                oldImgCont.remove();
                newImgCont.id = 'galleryImgContainer';
                isAnimating = false;
            }, 100);
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            actionSound.currentTime = 0; actionSound.play();
            const sequence = getCheckedSequence();
            
            if (sequence.length === 0) {
                showSystemAlert("Data Missing: Requires at least one selected image.");
                return;
            }

            showProgressPopup();
            const bar = document.getElementById('pdfProgressBar');
            const pText = document.getElementById('pdfProgressText');

            setTimeout(async () => {
                const { jsPDF } = window.jspdf;
                let pdf = null; 

                for (let i = 0; i < sequence.length; i++) {
                    const imgObj = sequence[i];
                    await new Promise(resolve => {
                        let img = new Image(); img.src = imgObj.dataUrl;
                        img.onload = () => {
                            let imgW = img.naturalWidth;
                            let imgH = img.naturalHeight;
                            
                            let isLandscape = imgW > imgH;
                            let orientation = isLandscape ? 'l' : 'p';
                            
                            let a4W = isLandscape ? 297 : 210;
                            let a4H = isLandscape ? 210 : 297;

                            if (i === 0) {
                                pdf = new jsPDF({ orientation: orientation, unit: 'mm', format: 'a4' });
                                pdf.setDisplayMode('100%', 'continuous', 'UseOutlines');
                            } else {
                                pdf.addPage('a4', orientation);
                            }

                            let ratio = imgW / imgH;
                            
                            let drawW = a4W;
                            let drawH = a4W / ratio;
                            
                            if (drawH > a4H) { 
                                drawH = a4H; 
                                drawW = a4H * ratio; 
                            }
                            
                            let xOffset = (a4W - drawW) / 2;
                            let yOffset = (a4H - drawH) / 2;

                            pdf.addImage(img, 'JPEG', xOffset, yOffset, drawW, drawH);
                            resolve();
                        };
                    });

                    let percent = Math.round(((i + 1) / sequence.length) * 100);
                    bar.style.width = percent + '%'; pText.textContent = `PROCESSING ${percent}%`;
                }

                generatedPdfBlob = pdf.output('blob');
                let defaultPdfName = sequence[0].name.split('.').slice(0, -1).join('.') || 'Nier_Document';
                setTimeout(() => showDownloadPopup(defaultPdfName), 500);

            }, 500);
        });

    </script>
</body>
