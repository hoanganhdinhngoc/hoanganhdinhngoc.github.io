<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>CDN || JSON to HTML Table</title>

    <script src="https://hoanganhdinhngoc.github.io/cdn/nier-list-template/modules/popup/nier-popup.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/json-lint.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
            --nier-error-red: #850000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection {
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
        }

        ::selection {
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 1em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-transform: uppercase;
            padding-left: 10px;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 2em;
            align-items: flex-start;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 25px;
        }

        .input-panel {
            flex: 0 0 500px;
            /* Khắc phục lỗi vỡ layout khi paste dòng JSON quá dài */
            min-width: 0; 
            max-width: 100%;
        }

        .result-panel {
            flex: 1;
            min-width: 0;
        }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group {
            margin-bottom: 20px;
        }

        /* Khung Tiêu đề & Nút Beautify */
        .header-json {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .header-json label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 0;
        }

        .format-btn {
            background: transparent;
            border: 2px solid var(--nier-dark);
            color: var(--nier-dark);
            padding: 4px 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            outline: none;
        }

        .format-btn:hover {
            background: #4e493a;
            color: #d3cebb;
        }

        /* --- NIE-R THEME OVERRIDES CHO CODEMIRROR --- */
        .CodeMirror {
            width: 100%;
            height: 350px;
            font-family: Consolas, monospace;
            font-size: 14px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .5);
            color: #4b4340;
            line-height: 1.5;
        }
        
        .CodeMirror-gutters {
            background: rgba(100, 98, 86, 0.2);
            border-right: 2px solid rgba(100, 98, 86, 0.3);
        }
        
        .CodeMirror-linenumber {
            color: #4b4340;
            font-weight: bold;
            opacity: 0.8;
        }

        .CodeMirror-lint-mark-error {
            background-color: rgba(133, 0, 0, 0.2);
            border-bottom: 2px solid var(--nier-error-red);
        }
        
        .CodeMirror-lint-marker-error {
            background-image: none;
            background-color: var(--nier-error-red);
            border-radius: 50%;
            width: 10px;
            height: 10px;
            margin-top: -2.5px;
            margin-left: 3px;
            box-shadow: 0 0 4px var(--nier-error-red);
        }

        .CodeMirror-lint-tooltip {
            background: #4e493a;
            color: #d3cebb;
            border: 1px solid var(--nier-dark);
            font-family: 'Montserrat', sans-serif;
            border-radius: 0;
            box-shadow: 2px 2px 1px #4f4b42;
        }

        .CodeMirror-matchingbracket {
            color: #d3cebb !important;
            background-color: #4e493a;
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
        }
        
        .CodeMirror-nonmatchingbracket {
            color: var(--nier-error-red) !important;
            font-weight: bold;
        }

        /* ------------------------------------------- */

        .themebutton {
            cursor: pointer;
            width: 100%;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 16px;
            color: #4b4340;
            border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            text-align: center;
            margin-top: 10px;
        }

        .themebutton:hover {
            color: #d3cebb;
            background-position: left bottom;
        }

        .table-scroll {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid var(--nier-dark);
            scrollbar-width: thin;
            background: #b2b2b21a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4e493a;
            color: #d3cebb;
            padding: 12px;
            position: sticky;
            top: 0;
            font-size: 14px;
            border: 1px solid var(--nier-dark);
        }

        td {
            padding: 12px;
            text-align: left;
            border: 1px solid rgba(75, 67, 64, 0.4);
            font-size: 13px;
            color: var(--nier-dark);
            vertical-align: top;
        }

        td ul {
            margin: 0;
            padding-left: 20px;
            list-style-type: square;
        }
        td ul ul {
            margin: 4px 0 8px 0;
            list-style-type: circle;
            opacity: 0.85;
        }

        /* Responsive */
        @media (max-width: 920px) {
            .function-wrapper {
                flex-direction: column;
                gap: 1.5em;
                align-items: center;
            }
            .input-panel,
            .result-panel {
                flex: none;
                width: 100%;
                max-width: 100%;
            }
            .title-main {
                font-size: 22px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K6GLMCB" height="0" width="0"
    style="display:none;visibility:hidden"></iframe></noscript>
    <audio id="hover-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg">
    </audio>
    <audio id="click-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg">
    </audio>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">JSON to HTML Table</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Input Data</h2>
                    <div class="control-group">
                        <div class="header-json">
                            <label for="jsonInput">JSON Code</label>
                            <button id="formatToggleBtn" class="format-btn">beautify</button>
                        </div>
                        <textarea id="jsonInput" placeholder="Enter JSON data here (multiline)..."></textarea>
                    </div>
                    <button id="convertButton" class="themebutton">Convert to Table</button>
                </div>

                <div class="result-panel section">
                    <h2 class="sectionTitle">Output Preview</h2>
                    <div class="table-scroll">
                        <div id="tableContainer">
                            <div style="padding: 20px; text-align: center; color: rgba(75, 67, 64, 0.7); font-style: italic;">
                                Waiting for data...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const hoverSound = document.getElementById("hover-sound");
            const clickSound = document.getElementById("click-sound");

            $(document).on('mouseenter', '.themebutton, .format-btn, .CodeMirror', function() { 
                hoverSound.currentTime = 0; 
                hoverSound.play(); 
            });

            // Khởi tạo CodeMirror
            var jsonEditor = CodeMirror.fromTextArea(document.getElementById("jsonInput"), {
                mode: "application/json",
                lineNumbers: true, 
                lint: true,        
                matchBrackets: true, 
                gutters: ["CodeMirror-lint-markers", "CodeMirror-linenumbers"]
                // lineWrapping: false (mặc định) => Code dài sẽ hiển thị scroll ngang, không vỡ layout
            });

            // Logic Format/Origin (Beautify)
            let isFormatted = false;
            let originalJsonData = "";

            $('#formatToggleBtn').on('click', function() {
                clickSound.currentTime = 0;
                clickSound.play();

                if (!isFormatted) {
                    // Lưu lại cấu trúc lúc paste
                    originalJsonData = jsonEditor.getValue();
                    if (!originalJsonData.trim()) return;

                    try {
                        let parsedData = JSON.parse(originalJsonData);
                        let beautifiedData = JSON.stringify(parsedData, null, 4);
                        
                        jsonEditor.setValue(beautifiedData);
                        isFormatted = true;
                        $(this).text("origin");
                    } catch (error) {
                        showPopup("SYSTEM ALERT", "<p>Cannot beautify: JSON syntax error!</p>");
                    }
                } else {
                    // Trả về origin ban đầu
                    jsonEditor.setValue(originalJsonData);
                    isFormatted = false;
                    $(this).text("beautify");
                }
            });

            // Reset Toggle nếu User tự động gõ/sửa code trong lúc đang bật Beautify
            jsonEditor.on("change", function(cm, changeObj) {
                if (changeObj.origin !== "setValue" && isFormatted) {
                    isFormatted = false;
                    $('#formatToggleBtn').text("beautify");
                }
            });

            // Làm phẳng Object (Flattening)
            function flattenObject(ob, prefix = false, result = null) {
                result = result || {};
                for (const i in ob) {
                    if (!ob.hasOwnProperty(i)) continue;
                    if ((typeof ob[i]) === 'object' && ob[i] !== null && !Array.isArray(ob[i])) {
                        flattenObject(ob[i], (prefix ? prefix + '.' : '') + i, result);
                    } else {
                        result[(prefix ? prefix + '.' : '') + i] = ob[i];
                    }
                }
                return result;
            }

            // Render Cell (Đặc biệt cho Array 1 cấp)
            function renderCellValue(val) {
                if (Array.isArray(val)) {
                    if (val.length === 0) return '[]';
                    
                    let isArrayOfObjects = val.every(v => typeof v === 'object' && v !== null && !Array.isArray(v));
                    let isArrayOfPrimitives = val.every(v => typeof v !== 'object' || v === null);

                    if (isArrayOfObjects) {
                        let innerKeys = [];
                        val.forEach(obj => {
                            Object.keys(obj).forEach(k => { if (!innerKeys.includes(k)) innerKeys.push(k); });
                        });
                        
                        let html = '<ul>';
                        innerKeys.forEach(k => {
                            html += `<li><b>${k}</b><ul>`; 
                            val.forEach(obj => {
                                let innerVal = obj[k] !== undefined ? obj[k] : '';
                                if (typeof innerVal === 'object' && innerVal !== null) {
                                    innerVal = JSON.stringify(innerVal); 
                                }
                                html += `<li>${innerVal}</li>`; 
                            });
                            html += `</ul></li>`;
                        });
                        html += '</ul>';
                        return html;
                    } else if (isArrayOfPrimitives) {
                        let html = '<ul>';
                        val.forEach(v => {
                            html += `<li>${v}</li>`;
                        });
                        html += '</ul>';
                        return html;
                    } else {
                        return JSON.stringify(val); 
                    }
                } else if (typeof val === 'object' && val !== null) {
                    return JSON.stringify(val);
                }
                return val;
            }

            // Xử lý Convert
            $('#convertButton').on('click', function () {
                clickSound.currentTime = 0;
                clickSound.play();

                var jsonInput = jsonEditor.getValue();
                var jsonData;

                if (!jsonInput.trim()) {
                    showPopup("SYSTEM ALERT", "<p>Please enter some JSON data!</p>");
                    return;
                }

                try {
                    jsonData = JSON.parse(jsonInput);
                } catch (error) {
                    showPopup("SYSTEM ALERT", "<p>Invalid JSON format! Please fix the syntax errors before converting.</p>");
                    return;
                }

                // 1. Auto-unwrap Root Object 
                if (!Array.isArray(jsonData) && typeof jsonData === 'object' && jsonData !== null) {
                    let largestArray = null;
                    let maxLen = -1;
                    for (let key in jsonData) {
                        if (Array.isArray(jsonData[key]) && jsonData[key].length > maxLen) {
                            largestArray = jsonData[key];
                            maxLen = jsonData[key].length;
                        }
                    }
                    if (largestArray) {
                        jsonData = largestArray;
                    } else {
                        jsonData = [jsonData];
                    }
                } else if (!Array.isArray(jsonData)) {
                    jsonData = [jsonData];
                }

                if (jsonData.length === 0) {
                    $('#tableContainer').html('<div style="padding: 20px; text-align: center;">Mảng JSON trống.</div>');
                    return;
                }

                // 2. Xử lý Mảng Nguyên Thủy (Array of primitives)
                jsonData = jsonData.map(function(item) {
                    if (typeof item !== 'object' || item === null) {
                        return { "Value": item };
                    }
                    return item;
                });

                // 3. Làm Phẳng Dữ Liệu Object (Flatten)
                jsonData = jsonData.map(function(item) {
                    return flattenObject(item);
                });

                // Lấy Headers
                var headers = [];
                jsonData.forEach(function(item) {
                    Object.keys(item).forEach(function(key) {
                        if (!headers.includes(key)) headers.push(key);
                    });
                });

                // Tạo Bảng
                var tableHtml = '<table>';
                tableHtml += '<thead><tr>';
                headers.forEach(function (header) {
                    tableHtml += '<th>' + header + '</th>';
                });
                tableHtml += '</tr></thead>';

                tableHtml += '<tbody>';
                jsonData.forEach(function (rowItem) {
                    tableHtml += '<tr>';
                    headers.forEach(function (header) {
                        var cellValue = rowItem[header] !== undefined ? rowItem[header] : '';
                        tableHtml += '<td>' + renderCellValue(cellValue) + '</td>';
                    });
                    tableHtml += '</tr>';
                });
                tableHtml += '</tbody></table>';

                $('#tableContainer').html(tableHtml);
            });
        });
    </script>
</body>
</html>
