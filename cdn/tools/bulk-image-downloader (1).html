<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>CDN || Bulk Image Downloader</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #85000083;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }
        ::selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 1em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-transform: uppercase;
            padding-left: 10px;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 2em;
            align-items: stretch;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-panel { flex: 0 0 550px; }
        .result-panel { flex: 1; min-width: 0; }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .toolzone {
            width: 100%;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .5);
            color: #4b4340;
            outline: none;
            resize: vertical;
        }
        
        select.toolzone { cursor: pointer; }
        textarea.toolzone { min-height: 150px; }

        .themebutton {
            cursor: pointer;
            padding: 12px 20px;
            font-weight: bold;
            color: #4b4340;
            border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .themebutton:hover:not(:disabled) { color: #d3cebb; background-position: left bottom; }
        .themebutton:disabled { opacity: 0.4; cursor: not-allowed; background: transparent; }

        .progress-container {
            width: 100%;
            border: 2px solid var(--nier-dark);
            background: rgba(100, 98, 86, 0.2);
            height: 40px;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--nier-dark);
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d3cebb;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            mix-blend-mode: difference;
        }

        .summary-box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(100, 98, 86, 0.1);
            padding: 20px;
        }

        .summary-item span {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--nier-dark);
        }

        .log-area {
            margin-top: 15px;
            font-size: 11px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border: 1px dashed var(--nier-dark);
        }

        .log-area div { margin-bottom: 4px; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
        .warning { color: #d84315; }

        /* Custom Popup Styles */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9998;
        }

        .popupSection {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: rgba(216, 210, 186, .95);
            font-family: 'Montserrat', sans-serif;
            color: #4b4340;
            box-shadow: 2px 2px 10px #4f4b42;
            z-index: 9999;
        }

        .popupSectionTitle {
            padding: 12px 15px;
            background: rgba(68, 66, 60, 0.98);
            color: #d3cebb;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
        }

        .boxContent {
            padding: 25px 20px;
            text-align: center;
        }

        .boxContent p {
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 14px;
        }

        .popup-btn {
            width: auto;
            min-width: 150px;
            display: inline-block;
            margin-top: 0;
        }

        @media (max-width: 920px) {
            .function-wrapper { flex-direction: column; gap: 1.5em; align-items: center; }
            .input-panel, .result-panel { flex: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>

<body>

    <audio id="hover-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg">
    </audio>
    <audio id="click-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg">
    </audio>

    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popupSection" id="customPopup">
        <h2 class="popupSectionTitle" id="popupTitle">System Alert</h2>
        <div class="boxContent">
            <p id="popupMessage">Alert message goes here.</p>
            <button id="popupOkBtn" class="themebutton popup-btn">Ok</button>
        </div>
    </div>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">Bulk Image Downloader</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Target Specifications</h2>
                    
                    <div class="control-group">
                        <label>Image URLs (Comma or Line separated)</label>
                        <textarea id="urlInput" class="toolzone" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                    </div>

                    <div class="control-group">
                        <label>Target Folder Name</label>
                        <input type="text" id="folderName" class="toolzone" placeholder="Downloaded images">
                    </div>

                    <div class="control-group">
                        <label>Naming Convention</label>
                        <select id="namingConvention" class="toolzone">
                            <option value="1">Original Name (Get directly from url structure)</option>
                            <option value="2">Folder Name + Sequence (e.g., Folder 01.jpg)</option>
                        </select>
                    </div>

                    <button id="downloadBtn" class="themebutton">Initialize Download Sequence</button>
                </div>

                <div class="result-panel">
                    <div class="section" style="height: 100%;">
                        <h2 class="sectionTitle">System Status</h2>
                        
                        <div class="summary-box">
                            <div class="summary-item"><label>URLs Detected</label><span id="urlCount">0</span></div>
                            <div class="summary-item"><label>Processed</label><span id="downloadStatus">0 / 0</span></div>
                        </div>

                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar"></div>
                            <div id="progressText" class="progress-text">STANDBY 0%</div>
                        </div>

                        <div class="log-area" id="logArea">
                            <div>[SYSTEM] Awaiting input...</div>
                        </div>

                        <button id="saveBtn" class="themebutton" disabled style="margin-top: 20px;">Download Archive</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        const clickSound = document.getElementById("click-sound");
        
        const urlInput = document.getElementById('urlInput');
        const folderNameInput = document.getElementById('folderName');
        const namingConventionInput = document.getElementById('namingConvention');
        const downloadBtn = document.getElementById('downloadBtn');
        const saveBtn = document.getElementById('saveBtn');
        const urlCountEl = document.getElementById('urlCount');
        const downloadStatusEl = document.getElementById('downloadStatus');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const logArea = document.getElementById('logArea');

        let finalArchiveBlob = null; 
        let finalArchiveName = "Archive.zip";

        // --- HỆ THỐNG POPUP ---
        function showPopup(title, message) {
            clickSound.currentTime = 0;
            clickSound.play();
            $('#popupTitle').text(title);
            $('#popupMessage').text(message);
            $('#popupOverlay').fadeIn(300);
            $('#customPopup').fadeIn(300);
        }

        $('#popupOkBtn, #popupOverlay').click(function() {
            clickSound.currentTime = 0;
            clickSound.play();
            $('#popupOverlay').fadeOut(300);
            $('#customPopup').fadeOut(300);
        });

        // Âm thanh hover
        $(document).on('mouseenter', '.themebutton:not(:disabled), .toolzone', () => { 
            hoverSound.currentTime = 0; 
            hoverSound.play(); 
        });

        // --- LOGIC XỬ LÝ URL ---
        // Validate URL hợp lệ (phải là http hoặc https)
        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
                return false;  
            }
        }

        // Lấy toàn bộ các dòng text (loại bỏ dòng rỗng)
        function getRawItems() {
            const text = urlInput.value;
            return text.split(/[\n,]+/).map(u => u.trim()).filter(u => u !== '');
        }

        // Real-time update đếm URL hợp lệ
        urlInput.addEventListener('input', () => {
            const items = getRawItems();
            const validUrls = items.filter(isValidUrl);
            
            urlCountEl.innerText = validUrls.length;
            downloadStatusEl.innerText = `0 / ${validUrls.length}`;
        });

        function logMessage(msg, type = '') {
            const div = document.createElement('div');
            div.textContent = msg;
            if(type) div.className = type;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function generateFileName(url, index, option, folderName) {
            let cleanUrl = url.split('?')[0].trim();
            if (cleanUrl.endsWith('/')) cleanUrl = cleanUrl.slice(0, -1);
            
            let extMatch = cleanUrl.match(/\.(jpg|jpeg|png|gif|webp)/i);
            let ext = extMatch ? extMatch[0] : '.jpg';
            
            if (option === "1") {
                let parts = cleanUrl.split('/').filter(p => p);
                let name = parts.pop() || `image_${index + 1}`;
                
                if (!name.toLowerCase().endsWith(ext.toLowerCase())) name += ext;
                return name;
            } else {
                let seq = String(index + 1).padStart(2, '0');
                return `${folderName} ${seq}${ext}`;
            }
        }

        saveBtn.addEventListener('click', () => {
            if (finalArchiveBlob) {
                clickSound.play();
                saveAs(finalArchiveBlob, finalArchiveName);
                logMessage(`[SYSTEM] User requested archive download. File saved.`, 'success');
            }
        });

        downloadBtn.addEventListener('click', async () => {
            clickSound.play();
            const items = getRawItems();
            
            // Xử lý báo lỗi bằng Custom Popup thay vì alert
            if (items.length === 0) {
                showPopup("Data Missing", "Sir, please input at least one valid image URL to proceed.");
                return;
            }

            // Lọc ra các chuỗi không phải URL hợp lệ
            const invalidItems = items.filter(item => !isValidUrl(item));
            if (invalidItems.length > 0) {
                showPopup("Syntax Error Detected", "Sir, invalid entries found in the list. Please remove plain text or malformed URLs before initializing sequence.");
                return;
            }

            // Nếu qua bước trên, toàn bộ items đều là URLs hợp lệ
            const urls = items; 

            const folderName = folderNameInput.value.trim() || "Downloaded images";
            const namingOption = namingConventionInput.value;
            finalArchiveName = `${folderName}.zip`;
            
            downloadBtn.disabled = true;
            saveBtn.disabled = true;
            urlInput.disabled = true;
            finalArchiveBlob = null;
            
            logArea.innerHTML = ''; 
            logMessage(`[SYSTEM] Initiating local client-side extraction...`);
            progressText.innerText = "LOCAL PROCESSING...";
            
            progressBar.style.background = "var(--nier-dark)";
            progressBar.style.width = '5%'; 

            let localSuccess = true;
            const zip = new JSZip();
            const folder = zip.folder(folderName);
            let downloadedCount = 0;

            try {
                await Promise.all(urls.map(async (url, index) => {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("HTTP_ERROR");
                    
                    const blob = await response.blob();
                    const filename = generateFileName(url, index, namingOption, folderName);
                    
                    folder.file(filename, blob);
                    downloadedCount++;
                    
                    if (localSuccess) {
                        const percent = Math.round((downloadedCount / urls.length) * 100);
                        progressBar.style.width = percent + '%';
                        downloadStatusEl.innerText = `${downloadedCount} / ${urls.length}`;
                    }
                }));

                logMessage(`[SYSTEM] Local extraction successful. Compressing data...`, 'success');
                progressText.innerText = "ZIPPING DATA...";
                
                finalArchiveBlob = await zip.generateAsync({ type: "blob" });
                saveBtn.disabled = false; 

                logMessage(`[SYSTEM] Sequence complete. Archive secured in memory. Ready for download.`, 'success');
                progressText.innerText = "COMPLETE 100%";
                progressBar.style.width = '100%';

            } catch (error) {
                localSuccess = false;
                
                logMessage(`[ERROR] CORS policy violation or network barrier detected. Halting local sequence.`, 'error');
                logMessage(`[SYSTEM] Rerouting request to Core Server for remote execution...`);

                progressText.innerText = "SERVER PROCESSING...";
                progressBar.style.width = '50%'; 
                downloadStatusEl.innerText = `0 / ${urls.length}`;

                try {
                    const serverAPI = 'https://interdata.kurotheblackbear.io.vn/webhook/bulk-image-downloader'; 
                    
                    const calculatedTimeout = 30000 + (urls.length * 5000); 
                    logMessage(`[SYSTEM] Estimated server timeout: ${calculatedTimeout / 1000} seconds.`);

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), calculatedTimeout); 

                    const filePayload = urls.map((url, index) => ({
                        url: url,
                        filename: generateFileName(url, index, namingOption, folderName)
                    }));

                    const response = await fetch(serverAPI, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            files: filePayload,
                            folder_name: folderName
                        }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        let errorDetail = `Status ${response.status} ${response.statusText}`;
                        if (response.status === 404) errorDetail += " (Webhook URL not found or Workflow inactive)";
                        if (response.status === 500) errorDetail += " (Internal Server Error / Workflow crashed)";
                        if (response.status === 502 || response.status === 504) errorDetail += " (Bad Gateway / Timeout)";
                        throw new Error(`HTTP_ERR: ${errorDetail}`);
                    }

                    logMessage(`[SYSTEM] Core data received. Decrypting binary packet...`);
                    progressText.innerText = "DECRYPTING ZIP...";
                    progressBar.style.width = '90%';

                    const blob = await response.blob();
                    
                    if (blob.type !== 'application/zip' && blob.type !== 'application/x-zip-compressed' && blob.type !== 'application/octet-stream') {
                        throw new Error("Invalid payload. Expected a ZIP archive but received different content type.");
                    }

                    finalArchiveBlob = blob;
                    saveBtn.disabled = false; 

                    logMessage(`[SYSTEM] Sequence complete. Archive secured via Server. Waiting for user action.`, 'success');
                    progressText.innerText = "COMPLETE 100%";
                    progressBar.style.width = '100%';
                    downloadStatusEl.innerText = `${urls.length} / ${urls.length}`;

                } catch (serverError) {
                    let finalErrorMsg = serverError.message;
                    
                    if (serverError.name === 'AbortError') {
                        finalErrorMsg = `Connection timed out. Core Server took too long to respond (> ${calculatedTimeout / 1000}s).`;
                    } else if (finalErrorMsg.includes("Failed to fetch")) {
                        finalErrorMsg = "Network block. Possible causes: Server is down, incorrect URL, or Webhook CORS is not enabled.";
                    }

                    logMessage(`[ERROR] Server uplink failed: ${finalErrorMsg}`, 'error');
                    progressText.innerText = "UPLINK FAILED";
                    progressBar.style.background = "var(--secondary-color)";
                }

            } finally {
                downloadBtn.disabled = false;
                urlInput.disabled = false;
            }
        });
    </script>
</body>
</html>
