<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>CDN || Bulk Image Opener</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #85000083;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }
        ::selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 1em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-transform: uppercase;
            padding-left: 10px;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 2em;
            align-items: stretch;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-panel { flex: 0 0 550px; }
        .result-panel { flex: 1; min-width: 0; }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .toolzone {
            width: 100%;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .5);
            color: #4b4340;
            outline: none;
            resize: vertical;
        }
        
        textarea.toolzone { min-height: 250px; }

        .themebutton {
            cursor: pointer;
            padding: 12px 20px;
            font-weight: bold;
            color: #4b4340;
            border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .themebutton:hover:not(:disabled) { color: #d3cebb; background-position: left bottom; }
        .themebutton:disabled { opacity: 0.4; cursor: not-allowed; background: transparent; }

        .progress-container {
            width: 100%;
            border: 2px solid var(--nier-dark);
            background: rgba(100, 98, 86, 0.2);
            height: 40px;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--nier-dark);
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d3cebb;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            mix-blend-mode: difference;
        }

        .summary-box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(100, 98, 86, 0.1);
            padding: 20px;
        }

        .summary-item span {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--nier-dark);
        }

        .log-area {
            margin-top: 15px;
            font-size: 11px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border: 1px dashed var(--nier-dark);
        }

        .log-area div { margin-bottom: 4px; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
        .warning { color: #d84315; }

        /* Custom Popup Styles */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9998;
        }

        .popupSection {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: rgba(216, 210, 186, .95);
            font-family: 'Montserrat', sans-serif;
            color: #4b4340;
            box-shadow: 2px 2px 10px #4f4b42;
            z-index: 9999;
        }

        .popupSectionTitle {
            padding: 12px 15px;
            background: rgba(68, 66, 60, 0.98);
            color: #d3cebb;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
        }

        .boxContent {
            padding: 25px 20px;
            text-align: center;
        }

        .boxContent p {
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 14px;
        }

        .popup-btn {
            width: auto;
            min-width: 150px;
            display: inline-block;
            margin-top: 0;
        }

        @media (max-width: 920px) {
            .function-wrapper { flex-direction: column; gap: 1.5em; align-items: center; }
            .input-panel, .result-panel { flex: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>

<body>
    <audio id="hover-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg">
    </audio>
    <audio id="click-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg">
    </audio>

    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popupSection" id="customPopup">
        <h2 class="popupSectionTitle" id="popupTitle">System Alert</h2>
        <div class="boxContent">
            <p id="popupMessage">Alert message goes here.</p>
            <button id="popupOkBtn" class="themebutton popup-btn">Ok</button>
        </div>
    </div>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">Bulk Image Opener</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Target Specifications</h2>
                    
                    <div class="control-group">
                        <label>Image URLs (Comma or Line separated)</label>
                        <textarea id="urlInput" class="toolzone" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                    </div>

                    <button id="openBtn" class="themebutton">Initialize Open Sequence</button>
                </div>

                <div class="result-panel">
                    <div class="section" style="height: 100%;">
                        <h2 class="sectionTitle">System Status</h2>
                        
                        <div class="summary-box">
                            <div class="summary-item"><label>URLs Detected</label><span id="urlCount">0</span></div>
                            <div class="summary-item"><label>Tabs Processed</label><span id="openStatus">0 / 0</span></div>
                        </div>

                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar"></div>
                            <div id="progressText" class="progress-text">STANDBY 0%</div>
                        </div>

                        <div class="log-area" id="logArea">
                            <div>[SYSTEM] Awaiting input...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        const clickSound = document.getElementById("click-sound");
        
        const urlInput = document.getElementById('urlInput');
        const openBtn = document.getElementById('openBtn');
        const urlCountEl = document.getElementById('urlCount');
        const openStatusEl = document.getElementById('openStatus');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const logArea = document.getElementById('logArea');

        // --- HỆ THỐNG POPUP ---
        function showPopup(title, message) {
            clickSound.currentTime = 0;
            clickSound.play();
            $('#popupTitle').text(title);
            $('#popupMessage').text(message);
            $('#popupOverlay').fadeIn(300);
            $('#customPopup').fadeIn(300);
        }

        $('#popupOkBtn, #popupOverlay').click(function() {
            clickSound.currentTime = 0;
            clickSound.play();
            $('#popupOverlay').fadeOut(300);
            $('#customPopup').fadeOut(300);
        });

        // Âm thanh hover
        $(document).on('mouseenter', '.themebutton:not(:disabled), .toolzone', () => { 
            hoverSound.currentTime = 0; 
            hoverSound.play(); 
        });

        // --- LOGIC XỬ LÝ URL ---
        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
                return false;  
            }
        }

        function getRawItems() {
            const text = urlInput.value;
            return text.split(/[\n,]+/).map(u => u.trim()).filter(u => u !== '');
        }

        urlInput.addEventListener('input', () => {
            const items = getRawItems();
            const validUrls = items.filter(isValidUrl);
            
            urlCountEl.innerText = validUrls.length;
            openStatusEl.innerText = `0 / ${validUrls.length}`;
        });

        function logMessage(msg, type = '') {
            const div = document.createElement('div');
            div.textContent = msg;
            if(type) div.className = type;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        openBtn.addEventListener('click', async () => {
            clickSound.play();
            const items = getRawItems();
            
            if (items.length === 0) {
                showPopup("Data Missing", "Sir, please input at least one valid image URL to proceed.");
                return;
            }

            const invalidItems = items.filter(item => !isValidUrl(item));
            if (invalidItems.length > 0) {
                showPopup("Syntax Error Detected", "Sir, invalid entries found in the list. Please remove plain text or malformed URLs before initializing sequence.");
                return;
            }

            const urls = items; 
            
            openBtn.disabled = true;
            urlInput.disabled = true;
            
            logArea.innerHTML = ''; 
            logMessage(`[SYSTEM] Initiating multiple tab routing sequence...`);
            progressText.innerText = "OPENING TABS...";
            
            progressBar.style.background = "var(--nier-dark)";
            progressBar.style.width = '5%'; 

            let openedCount = 0;
            let blockedCount = 0;

            for (let i = 0; i < urls.length; i++) {
                // Thêm độ trễ cực nhỏ để UI Progress bar có thể cập nhật hiệu ứng mượt mà
                await new Promise(resolve => setTimeout(resolve, 150));
                
                const url = urls[i];
                try {
                    const newTab = window.open(url, '_blank');
                    
                    // Kiểm tra xem trình duyệt có chặn popup không
                    if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                        blockedCount++;
                        logMessage(`[WARNING] Browser blocked popup for Target ${i + 1}`, 'warning');
                    } else {
                        openedCount++;
                        logMessage(`[SYSTEM] Successfully routed Target ${i + 1} to new tab`, 'success');
                    }
                } catch (error) {
                    blockedCount++;
                    logMessage(`[ERROR] Failed to execute routing for Target ${i + 1}`, 'error');
                }

                const percent = Math.round(((i + 1) / urls.length) * 100);
                progressBar.style.width = percent + '%';
                openStatusEl.innerText = `${i + 1} / ${urls.length}`;
            }

            if (blockedCount > 0) {
                logMessage(`[SYSTEM] Sequence halted. ${blockedCount} actions were intercepted by Browser's Popup Blocker.`, 'error');
                progressText.innerText = "BLOCKED BY BROWSER";
                progressBar.style.background = "var(--secondary-color)";
                showPopup("Popup Blocked", `Sir, the browser intercepted ${blockedCount} tab(s). Please allow "Pop-ups and redirects" for this site in your browser settings to ensure full functionality.`);
            } else {
                logMessage(`[SYSTEM] Sequence complete. All image routes successfully opened.`, 'success');
                progressText.innerText = "COMPLETE 100%";
                progressBar.style.width = '100%';
            }

            openBtn.disabled = false;
            urlInput.disabled = false;
        });
    </script>
</body>
</html>
