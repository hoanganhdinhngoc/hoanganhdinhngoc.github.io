<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>CDN || N8N Bulk Image Downloader</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #85000083;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }
        ::selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 1em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-transform: uppercase;
            padding-left: 10px;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 2em;
            align-items: stretch;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-panel { flex: 0 0 550px; }
        .result-panel { flex: 1; min-width: 0; }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .toolzone {
            width: 100%;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .5);
            color: #4b4340;
            outline: none;
            resize: vertical;
        }
        
        textarea.toolzone { min-height: 150px; }

        .themebutton {
            cursor: pointer;
            padding: 12px 20px;
            font-weight: bold;
            color: #4b4340;
            border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .themebutton:hover { color: #d3cebb; background-position: left bottom; }
        .themebutton:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Khung hiển thị tiến trình mang phong cách Nier */
        .progress-container {
            width: 100%;
            border: 2px solid var(--nier-dark);
            background: rgba(100, 98, 86, 0.2);
            height: 40px;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--nier-dark);
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d3cebb;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            mix-blend-mode: difference;
        }

        .summary-box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(100, 98, 86, 0.1);
            padding: 20px;
        }

        .summary-item span {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--nier-dark);
        }

        .log-area {
            margin-top: 15px;
            font-size: 11px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border: 1px dashed var(--nier-dark);
        }

        .log-area div { margin-bottom: 4px; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }

        @media (max-width: 920px) {
            .function-wrapper { flex-direction: column; gap: 1.5em; align-items: center; }
            .input-panel, .result-panel { flex: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>

<body>

    <audio id="hover-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg">
    </audio>
    <audio id="click-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg">
    </audio>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">Bulk Image Downloader</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Target Specifications</h2>
                    
                    <div class="control-group">
                        <label>Image URLs (Comma or Line separated)</label>
                        <textarea id="urlInput" class="toolzone" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                    </div>

                    <div class="control-group">
                        <label>Target Folder Name</label>
                        <input type="text" id="folderName" class="toolzone" placeholder="Downloaded images">
                    </div>

                    <button id="downloadBtn" class="themebutton">Initialize Download Sequence</button>
                </div>

                <div class="result-panel">
                    <div class="section" style="height: 100%;">
                        <h2 class="sectionTitle">System Status</h2>
                        
                        <div class="summary-box">
                            <div class="summary-item"><label>URLs Detected</label><span id="urlCount">0</span></div>
                            <div class="summary-item"><label>Processed</label><span id="downloadStatus">0 / 0</span></div>
                        </div>

                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar"></div>
                            <div id="progressText" class="progress-text">STANDBY 0%</div>
                        </div>

                        <div class="log-area" id="logArea">
                            <div>[SYSTEM] Awaiting input...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        const clickSound = document.getElementById("click-sound");
        
        const urlInput = document.getElementById('urlInput');
        const folderNameInput = document.getElementById('folderName');
        const downloadBtn = document.getElementById('downloadBtn');
        const urlCountEl = document.getElementById('urlCount');
        const downloadStatusEl = document.getElementById('downloadStatus');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const logArea = document.getElementById('logArea');

        // Hiệu ứng âm thanh khi di chuột
        $(document).on('mouseenter', '.themebutton, .toolzone', () => { 
            hoverSound.currentTime = 0; 
            hoverSound.play(); 
        });

        // Hàm phân tích URL từ Textarea
        function getUrls() {
            const text = urlInput.value;
            return text.split(/[\n,]+/).map(u => u.trim()).filter(u => u !== '');
        }

        // Cập nhật số lượng URL được nhận diện theo thời gian thực
        urlInput.addEventListener('input', () => {
            const urls = getUrls();
            urlCountEl.innerText = urls.length;
            downloadStatusEl.innerText = `0 / ${urls.length}`;
        });

        function logMessage(msg, type = '') {
            const div = document.createElement('div');
            div.textContent = msg;
            if(type) div.className = type;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Xử lý khi ấn nút kết nối tới n8n
        downloadBtn.addEventListener('click', async () => {
            clickSound.play();
            const urls = getUrls();
            
            if (urls.length === 0) {
                alert("Sir, please input at least one valid image URL.");
                return;
            }

            const folderName = folderNameInput.value.trim() || "Downloaded images";
            
            // Đóng băng UI để tránh bấm nhiều lần
            downloadBtn.disabled = true;
            urlInput.disabled = true;
            logArea.innerHTML = '<div>[SYSTEM] Establishing uplink to n8n Endpoint...</div>';
            progressText.innerText = "SERVER PROCESSING...";
            
            // Thanh tiến trình chạy ảo khoảng 50% để báo cho User biết hệ thống đang đợi phản hồi
            progressBar.style.background = "var(--nier-dark)";
            progressBar.style.width = '50%'; 

            try {
                // Endpoint n8n của Sir
                const serverAPI = 'https://interdata.kurotheblackbear.io.vn/webhook/bulk-image-downloader'; 

                const response = await fetch(serverAPI, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        urls: urls,
                        folder_name: folderName
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server responded with status: ${response.status}`);
                }

                logMessage(`[SYSTEM] Core data received. Decrypting binary packet...`);
                progressText.innerText = "DOWNLOADING ZIP...";
                progressBar.style.width = '90%';

                // Lấy dữ liệu file Zip dưới dạng blob
                const blob = await response.blob();
                
                // Kích hoạt popup lưu file
                saveAs(blob, `${folderName}.zip`);

                // Hoàn thành
                logMessage(`[SYSTEM] Sequence complete. Archive secured.`, 'success');
                progressText.innerText = "COMPLETE 100%";
                progressBar.style.width = '100%';
                downloadStatusEl.innerText = `${urls.length} / ${urls.length}`;

            } catch (error) {
                logMessage(`[ERROR] Uplink failed: ${error.message}`, 'error');
                progressText.innerText = "CONNECTION FAILED";
                progressBar.style.background = "var(--secondary-color)";
            } finally {
                // Mở khóa giao diện
                downloadBtn.disabled = false;
                urlInput.disabled = false;
            }
        });
    </script>
</body>
</html>
