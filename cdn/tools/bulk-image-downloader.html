<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/images/Koi-Kanji.png">
    <title>CDN || Bulk Image Downloader</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            --primary-color: #008a008a;
            --secondary-color: #85000083;
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: #4e493a;
            --nier-text-light: #d3cebb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }
        ::selection { color: #d3cebb; background: rgba(100, 98, 86, 0.8); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
                linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            min-height: 100vh;
        }

        .coreSystem {
            display: inline-block;
            width: 100%;
            min-height: 100vh;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .warp-container {
            margin-top: 1em;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-main {
            font-size: 26px;
            text-shadow: 4px 5px rgba(162, 156, 142, .8);
            margin-bottom: 30px;
            text-transform: uppercase;
            padding-left: 10px;
        }

        .function-wrapper {
            display: flex;
            flex-direction: row;
            gap: 2em;
            align-items: stretch;
        }

        .section {
            background: var(--nier-panel);
            box-shadow: 2px 2px 1px #4f4b42;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-panel { flex: 0 0 550px; }
        .result-panel { flex: 1; min-width: 0; }

        .sectionTitle {
            padding: 10px 15px;
            color: #d3cebb;
            background: rgba(100, 98, 86, 0.8);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .toolzone {
            width: 100%;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            border: 2px solid var(--nier-dark);
            background: rgba(216, 210, 186, .5);
            color: #4b4340;
            outline: none;
            resize: vertical;
        }
        
        textarea.toolzone { min-height: 150px; }

        .themebutton {
            cursor: pointer;
            padding: 12px 20px;
            font-weight: bold;
            color: #4b4340;
            border: 2px solid var(--nier-dark);
            background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .themebutton:hover { color: #d3cebb; background-position: left bottom; }
        .themebutton:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Khung hiển thị tiến trình mang phong cách Nier */
        .progress-container {
            width: 100%;
            border: 2px solid var(--nier-dark);
            background: rgba(100, 98, 86, 0.2);
            height: 40px;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--nier-dark);
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d3cebb;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            mix-blend-mode: difference;
        }

        .summary-box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(100, 98, 86, 0.1);
            padding: 20px;
        }

        .summary-item span {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--nier-dark);
        }

        .log-area {
            margin-top: 15px;
            font-size: 11px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border: 1px dashed var(--nier-dark);
        }

        .log-area div { margin-bottom: 4px; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
        .warning { color: #d84315; }

        @media (max-width: 920px) {
            .function-wrapper { flex-direction: column; gap: 1.5em; align-items: center; }
            .input-panel, .result-panel { flex: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>

<body>

    <audio id="hover-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg">
    </audio>
    <audio id="click-sound">
        <source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_52.ogg" type="audio/ogg">
    </audio>

    <div class="coreSystem">
        <div class="warp-container">
            <h1 class="title-main">Bulk Image Downloader</h1>
            
            <div class="function-wrapper">
                <div class="input-panel section">
                    <h2 class="sectionTitle">Target Specifications</h2>
                    
                    <div class="control-group">
                        <label>Image URLs (Comma or Line separated)</label>
                        <textarea id="urlInput" class="toolzone" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                    </div>

                    <div class="control-group">
                        <label>Target Folder Name</label>
                        <input type="text" id="folderName" class="toolzone" placeholder="Downloaded images">
                    </div>

                    <button id="downloadBtn" class="themebutton">Initialize Download Sequence</button>
                </div>

                <div class="result-panel">
                    <div class="section" style="height: 100%;">
                        <h2 class="sectionTitle">System Status</h2>
                        
                        <div class="summary-box">
                            <div class="summary-item"><label>URLs Detected</label><span id="urlCount">0</span></div>
                            <div class="summary-item"><label>Processed</label><span id="downloadStatus">0 / 0</span></div>
                        </div>

                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar"></div>
                            <div id="progressText" class="progress-text">STANDBY 0%</div>
                        </div>

                        <div class="log-area" id="logArea">
                            <div>[SYSTEM] Awaiting input...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        const clickSound = document.getElementById("click-sound");
        
        const urlInput = document.getElementById('urlInput');
        const folderNameInput = document.getElementById('folderName');
        const downloadBtn = document.getElementById('downloadBtn');
        const urlCountEl = document.getElementById('urlCount');
        const downloadStatusEl = document.getElementById('downloadStatus');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const logArea = document.getElementById('logArea');

        $(document).on('mouseenter', '.themebutton, .toolzone', () => { 
            hoverSound.currentTime = 0; 
            hoverSound.play(); 
        });

        function getUrls() {
            const text = urlInput.value;
            return text.split(/[\n,]+/).map(u => u.trim()).filter(u => u !== '');
        }

        urlInput.addEventListener('input', () => {
            const urls = getUrls();
            urlCountEl.innerText = urls.length;
            downloadStatusEl.innerText = `0 / ${urls.length}`;
        });

        function logMessage(msg, type = '') {
            const div = document.createElement('div');
            div.textContent = msg;
            if(type) div.className = type;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        downloadBtn.addEventListener('click', async () => {
            clickSound.play();
            const urls = getUrls();
            
            if (urls.length === 0) {
                alert("Sir, please input at least one valid image URL.");
                return;
            }

            const folderName = folderNameInput.value.trim() || "Downloaded images";
            
            downloadBtn.disabled = true;
            urlInput.disabled = true;
            
            logArea.innerHTML = ''; // Clear log
            logMessage(`[SYSTEM] Initiating local client-side extraction...`);
            progressText.innerText = "LOCAL PROCESSING...";
            
            progressBar.style.background = "var(--nier-dark)";
            progressBar.style.width = '5%'; 

            let localSuccess = true;
            const zip = new JSZip();
            const folder = zip.folder(folderName);
            let downloadedCount = 0;

            // --- PHASE 1: CLIENT-SIDE JAVASCRIPT DOWNLOAD ATTEMPT ---
            try {
                // Chạy ngầm các request bằng Promise.all. 
                // Nếu 1 request bị dính CORS, Promise.all sẽ lập tức ném ra lỗi.
                await Promise.all(urls.map(async (url, index) => {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("HTTP_ERROR");
                    
                    const blob = await response.blob();
                    
                    let filename = url.split('/').pop().split('?')[0];
                    if (!filename || !filename.includes('.')) {
                        filename = `image_${index + 1}.jpg`;
                    }
                    
                    folder.file(filename, blob);
                    downloadedCount++;
                    
                    // Cập nhật UI an toàn
                    if (localSuccess) {
                        const percent = Math.round((downloadedCount / urls.length) * 100);
                        progressBar.style.width = percent + '%';
                        downloadStatusEl.innerText = `${downloadedCount} / ${urls.length}`;
                    }
                }));

                // Nếu chạy hết đoạn trên mà không bị lỗi (catch), nghĩa là Local tải thành công 100%
                logMessage(`[SYSTEM] Local extraction successful. Compressing data...`, 'success');
                progressText.innerText = "ZIPPING DATA...";
                
                const zipContent = await zip.generateAsync({ type: "blob" });
                saveAs(zipContent, `${folderName}.zip`);

                logMessage(`[SYSTEM] Sequence complete. Archive secured locally.`, 'success');
                progressText.innerText = "COMPLETE 100%";
                progressBar.style.width = '100%';

            } catch (error) {
                localSuccess = false;
                
                logMessage(`[ERROR] CORS policy violation or network barrier detected. Halting local sequence.`, 'error');
                logMessage(`[SYSTEM] Rerouting request to Core Server for remote execution...`);

                progressText.innerText = "SERVER PROCESSING...";
                progressBar.style.width = '50%'; 
                downloadStatusEl.innerText = `0 / ${urls.length}`;

                try {
                    const serverAPI = 'https://interdata.kurotheblackbear.io.vn/webhook/bulk-image-downloader'; 
                    
                    // Thêm AbortController để xử lý lỗi Timeout nếu server treo quá lâu (vd: 60 giây)
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000); 

                    const response = await fetch(serverAPI, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            urls: urls,
                            folder_name: folderName
                        }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    // Xử lý chi tiết các mã lỗi HTTP trả về
                    if (!response.ok) {
                        let errorDetail = `Status ${response.status} ${response.statusText}`;
                        if (response.status === 404) errorDetail += " (Webhook URL not found or Workflow inactive)";
                        if (response.status === 500) errorDetail += " (Internal Server Error / Workflow crashed)";
                        if (response.status === 502 || response.status === 504) errorDetail += " (Bad Gateway / Timeout)";
                        throw new Error(`HTTP_ERR: ${errorDetail}`);
                    }

                    logMessage(`[SYSTEM] Core data received. Decrypting binary packet...`);
                    progressText.innerText = "DOWNLOADING ZIP...";
                    progressBar.style.width = '90%';

                    const blob = await response.blob();
                    
                    if (blob.type !== 'application/zip' && blob.type !== 'application/x-zip-compressed' && blob.type !== 'application/octet-stream') {
                        throw new Error("Invalid payload. Expected a ZIP archive but received different content type.");
                    }

                    saveAs(blob, `${folderName}.zip`);

                    logMessage(`[SYSTEM] Sequence complete. Archive secured via Server.`, 'success');
                    progressText.innerText = "COMPLETE 100%";
                    progressBar.style.width = '100%';
                    downloadStatusEl.innerText = `${urls.length} / ${urls.length}`;

                } catch (serverError) {
                    let finalErrorMsg = serverError.message;
                    
                    // Phân tích kỹ các lỗi do Javascript ném ra
                    if (serverError.name === 'AbortError') {
                        finalErrorMsg = "Connection timed out. Core Server took too long to respond (> 60s).";
                    } else if (finalErrorMsg.includes("Failed to fetch")) {
                        finalErrorMsg = "Network block. Possible causes: Server is down, incorrect URL, or Webhook CORS is not enabled (Missing Allowed Origins: *).";
                    }

                    logMessage(`[ERROR] Server uplink failed: ${finalErrorMsg}`, 'error');
                    progressText.innerText = "UPLINK FAILED";
                    progressBar.style.background = "var(--secondary-color)";
                }

            } finally {
                downloadBtn.disabled = false;
                urlInput.disabled = false;
            }
        });
    </script>
</body>
</html>
