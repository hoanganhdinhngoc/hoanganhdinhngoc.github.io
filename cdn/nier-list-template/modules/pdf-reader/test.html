  <style>
    @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400');


    * {
      margin: 0px;
      padding: 0px;
      scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
      scrollbar-width: auto;
    }

    .title {
      padding: 20px;
      font-family: 'Montserrat', sans-serif;
      color: #4b4340;
      text-shadow: 4px 5px rgba(162, 156, 142, .8);
    }

    .sectionTitle {
      padding: 1% 1%;
      color: #d3cebb;
      background: rgba(100, 98, 86, 0.8);
    }

    ::-moz-selection {
      /* Code for Firefox */
      color: #d3cebb;
      background: rgba(100, 98, 86, 0.8);
    }

    ::selection {
      color: #d3cebb;
      background: rgba(100, 98, 86, 0.8);
    }

    body {
      background-color: #ccc6b0;
      background-image: linear-gradient(90deg, rgba(198, 192, 170, .5) 30%, transparent 30%),
        linear-gradient(rgba(198, 192, 170, .5) 30%, transparent 30%);
      background-size: 5px 5px;
    }

    .coreSystem {
      display: inline-block;
      width: 100%;
      min-height: 100vh;
      box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
    }

    .section {
      margin: 20px 30px;
      padding: 0 0 1px 0;
      background: rgba(216, 210, 186, .5);
      font-family: 'Montserrat', sans-serif;
      line-height: 20pt;
      color: #4b4340;
      box-shadow: 2px 2px 1px #4f4b42;
    }

    .dropContent {
      display: block;
      padding: 2px;
      margin: 3px 8px;
      cursor: pointer;
    }

    .dropContent:hover {
      color: #d3cebb;
      background: #4e493a;
    }

    ul {
      list-style: none;
      padding: 0px 8px;
    }

    li,
    .toolTaoShortCode {
      margin-left: 20px;
    }

    li:last-of-type {
      margin-bottom: 8px;
    }

    .selected {
      font-weight: bold;
    }

    .top-logo {
      margin: 0px 30px;
      padding: 0 0 1px 0;
      filter: saturate(30%);
    }

    a {
      color: #4b4340;
      font-weight: bold;
    }

    .toolzone {
      display: block;
      margin: 1em;
      width: 100%;
      max-width: 90%;
      outline: none;
      border: 2px solid rgba(100, 98, 86, 1);
    }

    #hexToTextInput,
    #textToHexInput,
    #encryptPassInput,
    #encryptUrlInput {
      padding: 10px;
      margin: 10px 0;
      height: 0px;
      overflow: hidden;
      box-sizing: border-box;
      resize: none;
      color: #4b4340;
      background: rgba(216, 210, 186, .5);
    }

    #textToHexInput {
      min-height: 5em;
    }

    #textToHexOutput,
    #hexToTextOutput,
    #encryptResultOutput {
      padding: 10px;
      margin: 10px 0;
      min-height: 10em;
      overflow: hidden;
      box-sizing: border-box;
      resize: none;
      color: #d3cebb;
      background: rgba(100, 98, 86, 0.8);
    }

    .themebutton {
      cursor: pointer;
      width: 10em;
      height: 2em;
      font-weight: bold;
      color: #4b4340;
      border: none;
      background: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0.2) 50%);
      background-size: 200% 100%;
      background-position: right bottom;
      transition: all .2s ease-out;
    }

    .themebutton:hover {
      color: #d3cebb;
      background-position: left bottom;
    }

    .linkbutton {
      text-align: center;
      text-decoration: none;
      margin-left: 0px;
      font-size: 0.9em;
    }

    .soundControl {
      position: relative;
      float: right;
      right: 1em;
      top: 0.5em;
      font-size: 2em;
      color: rgba(100, 98, 86, 0.8);
    }

    /* For mobile */

    @media only screen and (max-width: 600px) {

      .sectionTitle,
      #info {
        font-size: 15px;
        padding: 0.5em 0.5em;
      }

      .content {
        margin: 0.5em 0em;
      }
    }
  </style>

  <script>

    $(document).ready(function () {

      // Sounds
      var tutorialSound = document.getElementById("tutorial-sound");
      var hoverSound = document.getElementById("hover-sound");
      var clickSound = document.getElementById("click-sound");
      var openlinkSound = document.getElementById("open-link-sound");
      $(".dropContent,.tutorial").hover(function () {
        hoverSound.play();
      }, function () {
        hoverSound.load();
      });

      $(".tutorial").click(function () {
        tutorialSound.play();
      });

      $("a").click(function () {
        openlinkSound.play();
      });

      $(".dropContent,.themebutton").click(function () {
        clickSound.play();
      });

      $("a").click(function () {
        openlinkSound.play();
      });

    });


  </script>

  <script>
    window.addEventListener("message", (event) => {

          iframe.width = "375";  // Expanded chatbox size
          iframe.height = "650";
        } else {

          iframe.height = "70";

  <!-- Interactive -->

  <script type='text/javascript'>
    // fade in section
    $('.section').hide();
    $('.section').fadeIn(500);

    // hide all content class to toggle
    $('.content').hide();

    //toggle dropContent
    $('.dropContent').click(function () {
      $(this).next().slideToggle(300);
      $(this).toggleClass("selected");
    });
    $('.tutorial').click(function () {
      $(this).next().slideToggle(300);
    });
  </script>


  <!-- Sound control -->
  <script>
    var themeSong = document.getElementById("themeSong");
    var isPlaying;

    function togglePlay() {
      if (isPlaying) {
        themeSong.pause();
        $('#controlButton').removeClass('fa-pause').addClass('fa-play');
      } else {
        themeSong.play();
        $('#controlButton').removeClass('fa-play').addClass('fa-pause');
      }
    }

    $('#controlButton').click(togglePlay);

    themeSong.onplaying = function () {
      isPlaying = true;
    };

    themeSong.onpause = function () {
      isPlaying = false;
    };

    $(document).keydown(function (event) {
      if ((event.key === " " || event.keyCode === 32) && !isTyping()) {
        event.preventDefault();
        togglePlay();
      }
    });

    function isTyping() {
      const activeElement = document.activeElement;
      return activeElement.tagName === "INPUT" ||
        activeElement.tagName === "TEXTAREA" ||
        activeElement.isContentEditable;
    }
  </script>
