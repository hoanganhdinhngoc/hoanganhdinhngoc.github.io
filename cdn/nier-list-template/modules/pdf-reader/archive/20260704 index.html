<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://hoanganhdinhngoc.github.io/cdn/images/Koi-Kanji.png">
    <title>Nier PDF Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:200,400,700');

        :root {
            /* Light Theme Variables */
            --nier-dark: #4b4340;
            --nier-beige: #ccc6b0;
            --nier-panel: rgba(216, 210, 186, .5);
            --nier-bg-btn: linear-gradient(to right, #4e493a 50%, rgba(0, 0, 0, 0) 50%);
            --nier-bg-pattern: rgba(198, 192, 170, .5);
            --nier-text-invert: #d3cebb;
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --nier-dark: #d3cebb;
            --nier-beige: #201e1d;
            --nier-panel: rgba(45, 42, 40, 0.8);
            --nier-bg-btn: linear-gradient(to right, #8a8275 50%, rgba(0, 0, 0, 0) 50%);
            --nier-bg-pattern: rgba(60, 56, 52, .5);
            --nier-text-invert: #201e1d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-color: rgba(100, 98, 86, 0.8) rgba(143, 139, 122, 0.7);
            scrollbar-width: auto;
        }

        ::-moz-selection { background: rgba(100, 98, 86, 0.8); color: var(--nier-text-invert); }
        ::selection { background: rgba(100, 98, 86, 0.8); color: var(--nier-text-invert); }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--nier-beige);
            background-image: 
                linear-gradient(90deg, var(--nier-bg-pattern) 30%, transparent 30%),
                linear-gradient(var(--nier-bg-pattern) 30%, transparent 30%);
            background-size: 5px 5px;
            color: var(--nier-dark);
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .coreSystem {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0px 0px 100px 20px rgba(0, 0, 0, 0.3);
        }

        /* ----- TOP BAR ----- */
        .top-bar {
            background: var(--nier-panel);
            border-bottom: 2px solid var(--nier-dark);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
            z-index: 20;
            transition: background 0.3s, border-color 0.3s;
        }

        .top-bar-header { flex: 1; display: flex; align-items: center; gap: 10px; }
        .pagination-group { flex: 1; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .right-controls { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

        .title-main {
            font-size: 18px;
            text-shadow: 2px 2px rgba(100, 98, 86, .3);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolzone {
            padding: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--nier-dark);
            background: rgba(100, 98, 86, 0.2);
            color: var(--nier-dark);
            outline: none;
            text-align: center;
            width: 60px;
            transition: all 0.3s;
        }

        .themebutton {
            cursor: pointer;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: var(--nier-dark);
            border: 2px solid var(--nier-dark);
            background: var(--nier-bg-btn);
            background-size: 200% 100%;
            background-position: right bottom;
            transition: all .2s ease-out;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 35px;
        }

        .themebutton:hover {
            color: var(--nier-text-invert);
            background-position: left bottom;
        }

        .separator { font-weight: bold; font-size: 16px; }

        /* Rotate Icon Animation */
        .rotate-90 {
            transform: rotate(90deg);
        }
        #fit-icon {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-only { display: none !important; }
        .mobile-text { display: none; }

        /* ----- CONTENT AREA ----- */
        .content-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ----- LEFT SIDEBAR ----- */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--nier-panel);
            border-right: 2px solid var(--nier-dark);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s, border-color 0.3s;
            margin-left: 0;
            z-index: 10;
        }

        .sidebar.closed { margin-left: -250px; }

        .sidebar-thumbnails {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .thumbnail-wrapper {
            cursor: pointer;
            border: 2px solid transparent;
            padding: 4px;
            text-align: center;
            transition: all 0.2s;
            background: rgba(100, 98, 86, 0.1);
            width: 100%;
        }

        .thumbnail-wrapper canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            background: #fff;
        }

        .thumbnail-wrapper.active {
            border-color: var(--nier-dark);
            background: rgba(100, 98, 86, 0.4);
        }

        .thumbnail-number { font-size: 12px; font-weight: bold; margin-top: 5px; color: var(--nier-dark); }

        /* ----- MAIN VIEWER ----- */
        .main-viewer {
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            background: rgba(100, 98, 86, 0.05);
            scroll-behavior: smooth;
        }

        .page-wrapper {
            margin-bottom: 25px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
            background: #fff;
            position: relative;
        }

        #loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px rgba(100, 98, 86, .5);
        }

        /* ----- RESPONSIVE (MOBILE & TABLET) ----- */
        @media (max-width: 920px) {
            .top-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 10px; }
            .top-bar-header { width: 100%; justify-content: space-between; }
            .pagination-group { width: 100%; order: 2; margin-bottom: 5px; }
            .right-controls { display: none !important; /* Thay thế bằng Right Sidebar */ }
            
            .title-main { flex: 1; text-align: left; padding: 0 10px; font-size: 16px; }
            .zoom-group { display: none !important; }
            .mobile-only { display: flex !important; }
            .mobile-text { display: inline-block; margin-left: 10px; font-size: 14px; }

            /* Left Sidebar Overlays Main Content */
            .sidebar { position: absolute; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 50; }

            /* Right Burger Menu Sidebar */
            #right-sidebar {
                position: absolute;
                top: 0;
                right: -250px;
                width: 220px;
                height: 100%;
                background: var(--nier-beige);
                border-left: 2px solid var(--nier-dark);
                display: flex;
                flex-direction: column;
                align-items: stretch;
                padding: 20px;
                gap: 15px;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
                z-index: 50;
                box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            }
            #right-sidebar.open { right: 0; }
            #right-sidebar .themebutton { justify-content: flex-start; padding: 12px 20px; }
        }
    </style>
</head>

<body>
    <audio id="hover-sound"><source src="https://hoanganhdinhngoc.github.io/cdn/sounds/core_16.ogg" type="audio/ogg"></audio>

    <div class="coreSystem">
        <div class="top-bar">
            <div class="top-bar-header">
                <button class="themebutton" id="toggle-sidebar" title="Toggle Sidebar"><i class="fas fa-bars"></i></button>
                <h1 class="title-main" id="pdf-title">Nier PDF Document</h1>
                <button class="themebutton mobile-only" id="toggle-right-sidebar" title="Menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            
            <div class="pagination-group">
                <button class="themebutton" id="prev-page"><i class="fas fa-chevron-left"></i></button>
                <input type="number" id="page-num" class="toolzone" value="1" min="1">
                <span class="separator">/</span>
                <span class="separator" id="page-count">--</span>
                <button class="themebutton" id="next-page"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="right-controls">
                <div class="toolbar-group zoom-group">
                    <button class="themebutton" id="zoom-out"><i class="fas fa-search-minus"></i></button>
                    <span class="separator" id="zoom-val">100%</span>
                    <button class="themebutton" id="zoom-in"><i class="fas fa-search-plus"></i></button>
                    <button class="themebutton" id="fit-width" title="Toggle Fit Width"><i class="fas fa-arrows-alt-h" id="fit-icon"></i></button>
                </div>
                <div class="toolbar-group tools-group">
                    <button class="themebutton toggle-theme-btn" title="Toggle Dark/Light Mode"><i class="fas fa-moon theme-icon-el"></i></button>
                    <button class="themebutton download-pdf-btn" title="Download"><i class="fas fa-download"></i></button>
                    <button class="themebutton print-pdf-btn" title="Print"><i class="fas fa-print"></i></button>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-thumbnails" id="sidebar-thumbnails"></div>
            </div>

            <div class="main-viewer" id="main-viewer">
                <div id="loading-msg">INITIALIZING SYSTEM...</div>
            </div>

            <div id="right-sidebar" class="mobile-only">
                <button class="themebutton toggle-theme-btn"><i class="fas fa-moon theme-icon-el"></i> <span class="mobile-text">Dark Mode</span></button>
                <button class="themebutton download-pdf-btn"><i class="fas fa-download"></i> <span class="mobile-text">Download File</span></button>
                <button class="themebutton print-pdf-btn"><i class="fas fa-print"></i> <span class="mobile-text">Print Document</span></button>
            </div>
        </div>
    </div>

    <iframe id="print-frame" style="display:none;"></iframe>

    <script>
        const hoverSound = document.getElementById("hover-sound");
        $(document).on('mouseenter', '.themebutton, .toolzone, .thumbnail-wrapper', () => { 
            hoverSound.currentTime = 0; hoverSound.play(); 
        });

        // 1. Quản lý Đóng Mở Sidebar Trái / Phải
        const sidebar = document.getElementById('sidebar');
        const rightSidebar = document.getElementById('right-sidebar');
        const btnToggleLeft = document.getElementById('toggle-sidebar');
        const btnToggleRight = document.getElementById('toggle-right-sidebar');

        // Mặc định đóng sidebar trái trên Mobile
        if (window.innerWidth <= 920) {
            sidebar.classList.add('closed');
        }

        btnToggleLeft.addEventListener('click', () => {
            sidebar.classList.toggle('closed');
            if (window.innerWidth <= 920) rightSidebar.classList.remove('open');
        });

        btnToggleRight.addEventListener('click', () => {
            rightSidebar.classList.toggle('open');
            sidebar.classList.add('closed');
        });

        // Tự động đóng sidebar khi click ra ngoài (chỉ kích hoạt trên màn hình nhỏ)
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 920) {
                // Click ra ngoài Left Sidebar
                if (!sidebar.contains(e.target) && !btnToggleLeft.contains(e.target)) {
                    sidebar.classList.add('closed');
                }
                // Click ra ngoài Right Sidebar
                if (!rightSidebar.contains(e.target) && !btnToggleRight.contains(e.target)) {
                    rightSidebar.classList.remove('open');
                }
            }
        });

        // 2. Quản lý Dark/Light Theme (Dùng chung cho Desktop và Mobile buttons)
        let isDarkTheme = false;
        const themeBtns = document.querySelectorAll('.toggle-theme-btn');
        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                isDarkTheme = !isDarkTheme;
                const icons = document.querySelectorAll('.theme-icon-el');
                if(isDarkTheme) {
                    document.body.setAttribute('data-theme', 'dark');
                    icons.forEach(i => i.classList.replace('fa-moon', 'fa-sun'));
                } else {
                    document.body.removeAttribute('data-theme');
                    icons.forEach(i => i.classList.replace('fa-sun', 'fa-moon'));
                }
            });
        });

        // 3. Khởi tạo PDF
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('file');
        
        let pdfTitleRaw = urlParams.get('title') ? urlParams.get('title').trim() : '';
        if (!pdfTitleRaw && pdfUrl) pdfTitleRaw = pdfUrl.substring(pdfUrl.lastIndexOf('/') + 1);
        if (!pdfTitleRaw) pdfTitleRaw = 'Nier PDF Document';
        
        document.title = `${pdfTitleRaw} || Nier System`;
        document.getElementById('pdf-title').innerText = pdfTitleRaw;

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.0; 
        let isFitWidthMode = false;
        let pageViewports = []; 
        let renderQueue = [];
        let isRendering = false;

        const mainViewer = document.getElementById('main-viewer');
        const sidebarThumbnails = document.getElementById('sidebar-thumbnails');
        
        async function processRenderQueue() {
            if (isRendering || renderQueue.length === 0) return;
            isRendering = true;
            const task = renderQueue.shift();
            try { await task(); } catch(e) { console.error(e); }
            isRendering = false;
            processRenderQueue();
        }

        function enqueueRenderTask(task) {
            renderQueue.push(task);
            processRenderQueue();
        }

        // Nhảy trang khi scroll
        mainViewer.addEventListener('scroll', () => {
            let closestPage = 1;
            let minDistance = Infinity;
            const wrappers = document.querySelectorAll('.page-wrapper');
            const viewerTop = mainViewer.getBoundingClientRect().top;

            wrappers.forEach(wrapper => {
                const rect = wrapper.getBoundingClientRect();
                const distance = Math.abs(rect.top - viewerTop);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestPage = wrapper.dataset.page;
                }
            });

            const currentInput = document.getElementById('page-num');
            if(currentInput.value !== closestPage) {
                currentInput.value = closestPage;
                document.querySelectorAll('.thumbnail-wrapper').forEach(t => t.classList.remove('active'));
                const activeThumb = document.getElementById(`thumb-${closestPage}`);
                if(activeThumb) {
                    activeThumb.classList.add('active');
                    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        });

        function scrollToPage(num) {
            const targetPage = document.getElementById(`page-${num}`);
            if(targetPage) {
                targetPage.scrollIntoView({ behavior: 'smooth' });
                // Trên mobile, bấm xong tự đóng sidebar cho thoáng
                if (window.innerWidth <= 920) sidebar.classList.add('closed');
            }
        }

        // 4. Logic Zoom & Toggle Fit Width
        function updateZoomUI() {
            document.getElementById('zoom-val').innerText = Math.round(scale * 100) + '%';
            document.querySelectorAll('.page-wrapper').forEach(wrapper => {
                const num = wrapper.dataset.page;
                const canvas = wrapper.querySelector('canvas');
                const vp = pageViewports[num];
                
                wrapper.style.width = (vp.width * scale) + 'px';
                wrapper.style.height = (vp.height * scale) + 'px';
                
                canvas.dataset.rendered = 'false';
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        const resetFitWidth = () => {
            if (isFitWidthMode) {
                isFitWidthMode = false;
                document.getElementById('fit-icon').classList.remove('rotate-90');
            }
        };

        const zoomIn = () => { scale += 0.25; resetFitWidth(); updateZoomUI(); };
        const zoomOut = () => { if (scale <= 0.5) return; scale -= 0.25; resetFitWidth(); updateZoomUI(); };
        
        document.getElementById('fit-width').addEventListener('click', () => {
            if (!isFitWidthMode) {
                // Kích hoạt Fit Width
                const containerWidth = mainViewer.clientWidth - 50; // Trừ hao khoảng padding và scrollbar
                scale = containerWidth / pageViewports[1].width;
                isFitWidthMode = true;
                document.getElementById('fit-icon').classList.add('rotate-90');
            } else {
                // Trở về mặc định 100%
                scale = 1.0;
                resetFitWidth(); // Sẽ bỏ biến cờ và xoay lại icon
            }
            updateZoomUI();
        });

        document.getElementById('zoom-in').addEventListener('click', zoomIn);
        document.getElementById('zoom-out').addEventListener('click', zoomOut);

        // 5. Events Toolbars
        document.getElementById('prev-page').addEventListener('click', () => {
            let cur = parseInt(document.getElementById('page-num').value);
            if (cur > 1) scrollToPage(cur - 1);
        });
        document.getElementById('next-page').addEventListener('click', () => {
            let cur = parseInt(document.getElementById('page-num').value);
            if (cur < pdfDoc.numPages) scrollToPage(cur + 1);
        });
        document.getElementById('page-num').addEventListener('change', (e) => {
            let num = parseInt(e.target.value);
            if(num >= 1 && num <= pdfDoc.numPages) scrollToPage(num);
            else e.target.value = 1;
        });

        // Download / Print dùng chung
        const downloadFile = () => {
            if (!pdfUrl) return;
            const a = document.createElement('a');
            a.href = pdfUrl; a.download = pdfTitleRaw.endsWith('.pdf') ? pdfTitleRaw : pdfTitleRaw + ".pdf";
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
        const printDoc = () => {
            if (!pdfUrl) return;
            const iframe = document.getElementById('print-frame');
            iframe.src = pdfUrl;
            iframe.onload = () => { iframe.contentWindow.print(); };
        };

        document.querySelectorAll('.download-pdf-btn').forEach(btn => btn.addEventListener('click', downloadFile));
        document.querySelectorAll('.print-pdf-btn').forEach(btn => btn.addEventListener('click', printDoc));

        // INIT SYSTEM
        if(pdfUrl) {
            pdfjsLib.getDocument(pdfUrl).promise.then(async pdfDoc_ => {
                pdfDoc = pdfDoc_;
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                document.getElementById('loading-msg').innerText = "CALCULATING MATRICES...";

                for (let num = 1; num <= pdfDoc.numPages; num++) {
                    const page = await pdfDoc.getPage(num);
                    pageViewports[num] = page.getViewport({ scale: 1.0 });
                }

                document.getElementById('loading-msg').style.display = 'none';

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const canvas = entry.target.querySelector('canvas');
                            if (canvas.dataset.rendered === 'false') {
                                canvas.dataset.rendered = 'true';
                                const num = entry.target.dataset.page;
                                enqueueRenderTask(async () => {
                                    if(canvas.dataset.rendered === 'false') return; 
                                    const page = await pdfDoc.getPage(parseInt(num));
                                    const viewport = page.getViewport({scale: scale});
                                    canvas.width = viewport.width;
                                    canvas.height = viewport.height;
                                    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                                });
                            }
                        }
                    });
                }, { root: mainViewer, rootMargin: '500px 0px' });

                for (let num = 1; num <= pdfDoc.numPages; num++) {
                    const vp = pageViewports[num];

                    // Thumbnail
                    const thumbWrap = document.createElement('div');
                    thumbWrap.className = 'thumbnail-wrapper' + (num === 1 ? ' active' : '');
                    thumbWrap.id = `thumb-${num}`;
                    thumbWrap.onclick = () => scrollToPage(num);

                    const thumbCanvas = document.createElement('canvas');
                    const numDiv = document.createElement('div');
                    numDiv.className = 'thumbnail-number';
                    numDiv.innerText = num;
                    
                    thumbWrap.appendChild(thumbCanvas);
                    thumbWrap.appendChild(numDiv);
                    sidebarThumbnails.appendChild(thumbWrap);

                    enqueueRenderTask(async () => {
                        const page = await pdfDoc.getPage(num);
                        const thumbVp = page.getViewport({scale: 0.2});
                        thumbCanvas.width = thumbVp.width;
                        thumbCanvas.height = thumbVp.height;
                        await page.render({canvasContext: thumbCanvas.getContext('2d'), viewport: thumbVp}).promise;
                    });

                    // Main Page
                    const pageWrap = document.createElement('div');
                    pageWrap.className = 'page-wrapper';
                    pageWrap.id = `page-${num}`;
                    pageWrap.dataset.page = num;
                    pageWrap.style.width = (vp.width * scale) + 'px';
                    pageWrap.style.height = (vp.height * scale) + 'px';

                    const mainCanvas = document.createElement('canvas');
                    mainCanvas.dataset.rendered = 'false'; 
                    pageWrap.appendChild(mainCanvas);
                    mainViewer.appendChild(pageWrap);

                    observer.observe(pageWrap);
                }

            }).catch(err => {
                document.getElementById('loading-msg').innerText = "ERROR: SYSTEM DATA CORRUPTED.";
            });
        } else {
            document.getElementById('loading-msg').innerText = "NO PDF TARGET ACQUIRED.";
        }
    </script>
</body>
</html>
